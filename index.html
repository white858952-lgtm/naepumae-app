<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내품애센터 스마트 관리 앱</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #ffe4e9; box-shadow: 0 10px 15px -3px rgba(255, 105, 180, 0.05); }
        .tab-active { color: #ff69b4; border-bottom: 3px solid #ff69b4; }
        /* 팝업 애니메이션 */
        .modal-bg { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); transition: opacity 0.3s; }
    </style>
</head>
<body class="pb-24">
    <div id="app" class="max-w-md mx-auto p-4">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-black text-[#ff69b4] mb-1">내품애 센터</h1>
            <p class="text-gray-500 text-sm">반려동물과 행복한 서대문</p>
        </header>

        <div class="flex justify-around mb-6 bg-white rounded-2xl p-1 shadow-sm border border-pink-50">
            <button onclick="showView('reg')" id="tab-reg" class="flex-1 py-3 text-sm font-bold tab-active">개체 등록</button>
            <button onclick="showView('list')" id="tab-list" class="flex-1 py-3 text-sm font-bold text-gray-400">업무 관리</button>
        </div>

        <div id="view-reg" class="space-y-6">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🐶 상세 정보 등록</h2>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="in-name" placeholder="이름" class="col-span-1 p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400 text-sm">
                    <input type="text" id="in-breed" placeholder="견종" class="col-span-1 p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400 text-sm">
                    <select id="in-gender" class="col-span-1 p-3 border border-pink-100 rounded-xl outline-none text-sm bg-white">
                        <option value="남아">남아</option>
                        <option value="여아">여아</option>
                    </select>
                    <input type="text" id="in-age" placeholder="추정 나이" class="col-span-1 p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400 text-sm">
                    <input type="text" id="in-personality" placeholder="성격 (예: 소심함, 친화적)" class="col-span-2 p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400 text-sm">
                    <textarea id="in-memo" placeholder="특이사항 및 메모" class="col-span-2 p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400 text-sm h-20"></textarea>
                    <button onclick="saveAnimal()" class="col-span-2 py-4 pink-gradient text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-transform mt-2">아이 등록하기</button>
                </div>
            </div>
            <div id="reg-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="view-list" class="hidden space-y-4 text-center">
            <div id="task-container" class="space-y-4 text-left"></div>
        </div>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 modal-bg">
        <div class="bg-white w-full max-w-xs rounded-[32px] p-6 text-center shadow-2xl scale-up">
            <div id="modal-icon" class="text-4xl mb-4"></div>
            <h3 id="modal-title" class="text-xl font-bold mb-2"></h3>
            <p id="modal-desc" class="text-gray-500 text-sm mb-6"></p>
            <div id="modal-btns" class="flex gap-2"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-pink-50 flex justify-around py-4 shadow-lg md:hidden rounded-t-3xl">
        <button onclick="showView('reg')" class="flex flex-col items-center gap-1">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">홈</span>
        </button>
        <button onclick="showView('list')" class="flex flex-col items-center gap-1">
            <span class="text-xl">📋</span><span class="text-[10px] font-bold">업무</span>
        </button>
    </nav>

    <script>
        let animals = JSON.parse(localStorage.getItem('naepumae_v2') || '[]');
        let pendingDeleteId = null;

        function showModal(type, title, desc, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const icon = document.getElementById('modal-icon');
            const btns = document.getElementById('modal-btns');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.remove('hidden');

            if (type === 'success') {
                icon.innerText = '✨';
                btns.innerHTML = `<button onclick="closeModal()" class="w-full py-3 pink-gradient text-white font-bold rounded-2xl">확인</button>`;
            } else if (type === 'confirm') {
                icon.innerText = '🗑️';
                btns.innerHTML = `
                    <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-2xl">취소</button>
                    <button id="modal-confirm-btn" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-2xl">삭제</button>
                `;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            }
        }

        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }

        function showView(view) {
            document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('tab-reg').className = view === 'reg' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            document.getElementById('tab-list').className = view === 'list' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            if(view === 'list') renderTasks();
        }

        function saveAnimal() {
            const name = document.getElementById('in-name').value;
            if(!name) return alert('이름은 필수입니다!');
            
            const newAnimal = {
                id: Date.now(),
                name,
                breed: document.getElementById('in-breed').value || '모름',
                gender: document.getElementById('in-gender').value,
                age: document.getElementById('in-age').value || '미정',
                personality: document.getElementById('in-personality').value || '정보 없음',
                memo: document.getElementById('in-memo').value || '',
                tasks: { walk:false, clean:false, meal:false }
            };

            animals.push(newAnimal);
            localStorage.setItem('naepumae_v2', JSON.stringify(animals));
            
            // 입력창 초기화
            ['in-name','in-breed','in-age','in-personality','in-memo'].forEach(id => document.getElementById(id).value = '');
            renderRegList();
            showModal('success', '등록 완료!', `${name}이가 가족을 기다립니다.`);
        }

        function askDelete(id) {
            showModal('confirm', '삭제하시겠습니까?', '데이터를 다시 복구할 수 없어요.', () => {
                animals = animals.filter(a => a.id !== id);
                localStorage.setItem('naepumae_v2', JSON.stringify(animals));
                renderRegList();
            });
        }

        function toggleTask(aniId, type) {
            const ani = animals.find(a => a.id === aniId);
            ani.tasks[type] = !ani.tasks[type];
            localStorage.setItem('naepumae_v2', JSON.stringify(animals));
            renderTasks();
        }

        function renderRegList() {
            const container = document.getElementById('reg-list');
            container.innerHTML = `<h3 class="font-bold text-gray-400 px-2 mt-4 mb-2 text-sm">보호 중인 아이들 (${animals.length})</h3>`;
            animals.forEach(a => {
                container.innerHTML += `
                    <div class="card relative overflow-hidden">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-[10px] bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full font-bold mb-1 inline-block">${a.gender} | ${a.age}</span>
                                <h3 class="font-black text-xl text-gray-800">${a.name}</h3>
                                <p class="text-xs text-gray-400">${a.breed}</p>
                            </div>
                            <button onclick="askDelete(${a.id})" class="p-2 text-gray-300 hover:text-red-400 transition-colors">🗑️</button>
                        </div>
                        <div class="text-xs text-gray-600 bg-pink-50/50 p-3 rounded-xl">
                            <div class="mb-1"><strong>성격:</strong> ${a.personality}</div>
                            <div class="line-clamp-2 italic text-gray-400">${a.memo}</div>
                        </div>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            if(animals.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-gray-400 px-10">보호 중인 아이가 없어요.<br>먼저 아이들을 등록해 주세요!</div>';
                return;
            }
            container.innerHTML = '';
            animals.forEach(a => {
                container.innerHTML += `
                    <div class="card">
                        <div class="flex justify-between items-center mb-4 border-b border-pink-50 pb-2">
                            <span class="font-bold text-gray-700">🐾 ${a.name}</span>
                            <span class="text-[10px] text-gray-400">${a.breed}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${['walk', 'clean', 'meal'].map(type => `
                                <button onclick="toggleTask(${a.id}, '${type}')" 
                                    class="py-3 rounded-2xl border-2 text-xs font-black transition-all ${a.tasks[type] ? 'bg-pink-400 border-pink-400 text-white' : 'bg-white border-pink-50 text-pink-200'}">
                                    ${type === 'walk' ? '산책' : type === 'clean' ? '청소' : '식사'}
                                </button>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }

        renderRegList();
    </script>
</body>
</html>
