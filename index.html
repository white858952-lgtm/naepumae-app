<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내품애센터 스마트 관리 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #ffe4e9; box-shadow: 0 4px 6px -1px rgba(255, 105, 180, 0.1); }
        .tab-active { color: #ff69b4; border-bottom: 3px solid #ff69b4; }
    </style>
</head>
<body class="pb-20">
    <div id="app" class="max-w-md mx-auto p-4">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-black text-[#ff69b4] mb-1">내품애 센터</h1>
            <p class="text-gray-500 text-sm">반려동물과 행복한 서대문</p>
        </header>

        <div class="flex justify-around mb-6 bg-white rounded-xl p-1 shadow-sm border border-pink-50">
            <button onclick="showView('reg')" id="tab-reg" class="flex-1 py-3 text-sm font-bold tab-active">개체 등록</button>
            <button onclick="showView('list')" id="tab-list" class="flex-1 py-3 text-sm font-bold text-gray-400">업무 관리</button>
        </div>

        <div id="view-reg" class="space-y-6">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🐶 신규 등록</h2>
                <div class="space-y-3">
                    <input type="text" id="in-name" placeholder="이름 (예: 멍멍이)" class="w-full p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400">
                    <input type="text" id="in-breed" placeholder="견종 (예: 리트리버)" class="w-full p-3 border border-pink-100 rounded-xl outline-none focus:border-pink-400">
                    <button onclick="saveAnimal()" class="w-full py-4 pink-gradient text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">등록하기</button>
                </div>
            </div>
            <div id="reg-list" class="space-y-3">
                </div>
        </div>

        <div id="view-list" class="hidden space-y-4">
            <div id="task-container" class="space-y-4">
                </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-pink-50 flex justify-around py-3 shadow-lg md:hidden">
        <button onclick="showView('reg')" class="text-xs font-bold text-pink-400">🏠 홈</button>
        <button onclick="showView('list')" class="text-xs font-bold text-gray-400">📋 업무</button>
    </nav>

    <script>
        let animals = JSON.parse(localStorage.getItem('naepumae_v1') || '[]');

        function showView(view) {
            document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('tab-reg').className = view === 'reg' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            document.getElementById('tab-list').className = view === 'list' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            if(view === 'list') renderTasks();
        }

        function saveAnimal() {
            const name = document.getElementById('in-name').value;
            const breed = document.getElementById('in-breed').value;
            if(!name) return alert('이름을 입력해주세요!');
            
            animals.push({ id: Date.now(), name, breed, tasks: { walk:false, clean:false, meal:false } });
            localStorage.setItem('naepumae_v1', JSON.stringify(animals));
            document.getElementById('in-name').value = '';
            document.getElementById('in-breed').value = '';
            renderRegList();
            alert('등록 완료!');
        }

        function deleteAnimal(id) {
            if(!confirm('삭제하시겠습니까?')) return;
            animals = animals.filter(a => a.id !== id);
            localStorage.setItem('naepumae_v1', JSON.stringify(animals));
            renderRegList();
        }

        function toggleTask(aniId, type) {
            const ani = animals.find(a => a.id === aniId);
            ani.tasks[type] = !ani.tasks[type];
            localStorage.setItem('naepumae_v1', JSON.stringify(animals));
            renderTasks();
        }

        function renderRegList() {
            const container = document.getElementById('reg-list');
            container.innerHTML = `<h3 class="font-bold text-gray-600">등록된 아이들 (${animals.length})</h3>`;
            animals.forEach(a => {
                container.innerHTML += `
                    <div class="card flex justify-between items-center">
                        <div><div class="font-bold text-lg">${a.name}</div><div class="text-xs text-gray-400">${a.breed}</div></div>
                        <button onclick="deleteAnimal(${a.id})" class="text-red-300 text-sm">삭제</button>
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            if(animals.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-gray-400">등록된 아이가 없습니다.</div>';
                return;
            }
            container.innerHTML = '';
            animals.forEach(a => {
                container.innerHTML += `
                    <div class="card">
                        <div class="font-bold mb-3 text-pink-500 border-b pb-2">🐾 ${a.name}</div>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="toggleTask(${a.id}, 'walk')" class="p-2 rounded-lg border text-xs font-bold ${a.tasks.walk ? 'bg-pink-400 text-white border-pink-400' : 'bg-white text-gray-400'}">산책</button>
                            <button onclick="toggleTask(${a.id}, 'clean')" class="p-2 rounded-lg border text-xs font-bold ${a.tasks.clean ? 'bg-pink-400 text-white border-pink-400' : 'bg-white text-gray-400'}">청소</button>
                            <button onclick="toggleTask(${a.id}, 'meal')" class="p-2 rounded-lg border text-xs font-bold ${a.tasks.meal ? 'bg-pink-400 text-white border-pink-400' : 'bg-white text-gray-400'}">식사</button>
                        </div>
                    </div>`;
            });
        }

        renderRegList();
    </script>
</body>
</html>
