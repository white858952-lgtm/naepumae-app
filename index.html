<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>내품애센터 스마트 관리 앱</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; overflow-x: hidden; }
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #ffe4e9; box-shadow: 0 10px 20px rgba(255, 105, 180, 0.03); }
        .modal-bg { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px); z-index: 10000; position: fixed; inset: 0; display: none; align-items: center; justify-content: center; }
        .modal-bg.active { display: flex; }
        #photo-preview { background-size: cover; background-position: center; transition: all 0.3s; }
        
        .content-area { padding-bottom: 100px; position: relative; z-index: 10; }
        nav { z-index: 50; position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; border-top: 1px solid #ffe4e9; box-shadow: 0 -5px 20px rgba(255,105,180,0.05); }
        
        .save-btn { cursor: pointer; position: relative; z-index: 100; touch-action: manipulation; -webkit-appearance: none; }
        .save-btn:active { transform: scale(0.96); opacity: 0.9; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .slide-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .btn-active { background-color: #fbcfe8; color: #db2777; border-color: #f472b6; font-weight: 900; }
        .btn-inactive { background-color: #f9fafb; color: #9ca3af; border-color: #e5e7eb; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 relative" onload="initApp()">
    <div class="content-area" id="main-content">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-black text-[#ff69b4] mb-1">내품애 센터</h1>
            <p class="text-gray-500 text-sm font-bold">반려동물과 행복한 서대문</p>
        </header>

        <div id="view-list" class="space-y-4">
            <div class="relative px-2 mb-2">
                <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
                    <span class="text-gray-400 text-lg">🔍</span>
                </div>
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="이름 또는 견종으로 빠르게 찾기" class="w-full pl-10 pr-4 py-3.5 bg-white border border-pink-100 rounded-2xl text-sm font-bold text-gray-700 shadow-sm outline-none focus:border-pink-300 transition-colors">
            </div>

            <div id="filter-container" class="flex gap-2 px-2 overflow-x-auto hide-scrollbar mb-4 pb-1"></div>
            
            <div id="task-container" class="space-y-4"></div>
        </div>

        <div id="view-reg" class="hidden space-y-6">
            <div class="card space-y-4">
                <div class="flex justify-between items-center">
                    <h2 id="reg-title" class="text-lg font-bold text-gray-700">📸 신규 보호 동물 등록</h2>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-bold">수정 취소</button>
                </div>
                
                <div id="photo-preview" onclick="document.getElementById('in-photo').click()" class="w-full h-52 rounded-3xl bg-pink-50 flex items-center justify-center border-2 border-dashed border-pink-200 relative overflow-hidden cursor-pointer">
                    <div id="photo-placeholder" class="text-center text-pink-300">
                        <span class="text-5xl">📸</span>
                        <p class="text-xs font-bold mt-2">사진 선택</p>
                    </div>
                    <input type="file" id="in-photo" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                    <button id="del-photo-btn" onclick="removePhoto(event)" class="hidden absolute top-3 right-3 bg-white text-pink-500 px-3 py-1 rounded-full text-[10px] font-black shadow-md z-20">사진 삭제</button>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <input type="text" id="in-name" placeholder="이름 (필수)" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 font-bold focus:bg-white focus:border-pink-300 transition-colors">
                    
                    <select id="in-type" onchange="updateBreeds()" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="" disabled selected>동물 종류</option>
                        <option value="개">개 🐶</option>
                        <option value="고양이">고양이 🐱</option>
                    </select>
                    
                    <select id="in-breed" onchange="checkCustomBreed()" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="" disabled selected>품종 선택</option>
                    </select>

                    <input type="text" id="in-breed-custom" placeholder="품종 직접 입력" class="hidden col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50 text-sm font-bold focus:border-pink-300">

                    <select id="in-gender" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="" disabled selected>성별</option>
                        <option value="남아">남아</option>
                        <option value="여아">여아</option>
                    </select>
                    
                    <input type="text" id="in-age" placeholder="추정 나이" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold">
                    
                    <select id="in-status" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-600 text-sm font-bold shadow-sm">
                        <option value="보호 중 🏡" selected>보호 중 (입양 대기 전)</option>
                        <option value="임시보호 🏨">임시보호 (호텔링/위탁)</option>
                        <option value="입양 대기 💝">입양 대기 (확정 완료)</option>
                    </select>

                    <div class="col-span-2 mt-2">
                        <p class="text-xs font-bold text-gray-400 mb-2 px-1">아이의 성격 (여러 개 선택 가능)</p>
                        <div class="flex flex-wrap gap-2" id="personality-container">
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">활발함</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">소심함</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">사람 좋아함</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">경계심/겁</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">공격성 주의</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">분리불안</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">입질 있음</button>
                            <button type="button" onclick="toggleMulti(this)" class="per-btn px-3 py-2 rounded-xl border border-gray-200 text-gray-500 bg-white text-xs font-bold active:scale-95">조용함</button>
                        </div>
                    </div>

                    <textarea id="in-memo" placeholder="구조 경위 및 초기 메모" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none h-24 bg-pink-50/20 text-sm font-bold mt-2"></textarea>
                    
                    <button id="btn-save-animal" type="button" onclick="saveAnimal(); return false;" class="save-btn col-span-2 py-5 pink-gradient text-white font-black rounded-2xl shadow-lg mt-2 transition-transform text-lg">
                        보호 동물 등록하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="flex justify-around py-3 shadow-lg rounded-t-[32px] items-center">
        <button id="nav-list" onclick="showView('list')" class="flex flex-col items-center gap-1 w-1/2 opacity-100 transition-opacity">
            <span class="text-2xl">📋</span><span class="text-[11px] font-black text-pink-500">개체 관리</span>
        </button>
        <div class="w-[1px] h-10 bg-pink-100"></div>
        <button id="nav-reg" onclick="showView('reg')" class="flex flex-col items-center gap-1 w-1/2 opacity-40 hover:opacity-100 transition-opacity">
            <span class="text-2xl">🐾</span><span class="text-[11px] font-black text-pink-500">신규 아이 등록</span>
        </button>
    </nav>

    <div id="profile-panel" class="slide-panel fixed inset-0 bg-gray-50 z-[120] transform translate-x-full flex flex-col h-full overflow-hidden">
        <div class="px-5 py-4 bg-white border-b border-pink-100 flex justify-between items-center shadow-sm sticky top-0 z-10 pt-[max(env(safe-area-inset-top),16px)]">
            <button onclick="closeProfilePanel()" class="text-gray-400 text-3xl font-black active:scale-90 transition-transform">&lsaquo;</button>
            <span class="font-black text-gray-700">개체 관리 카드</span>
            <div class="w-6"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-5 pb-32 space-y-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-pink-100 relative">
                <div class="absolute top-4 right-4 flex gap-2">
                    <button onclick="editAnimalProfile()" class="text-[11px] px-3 py-1.5 bg-pink-50 text-pink-600 rounded-lg font-bold shadow-sm active:scale-95">정보 수정</button>
                </div>

                <div class="flex flex-col items-center mt-2">
                    <div id="pp-photo" class="w-28 h-28 rounded-full bg-cover bg-center shadow-md border-4 border-pink-50 mb-4 flex items-center justify-center bg-pink-100 text-4xl">🐾</div>
                    <span id="pp-status" class="px-3 py-1 rounded-full text-[10px] font-black shadow-sm mb-2">보호 중</span>
                    <h2 id="pp-name" class="text-3xl font-black text-gray-800 mb-1">이름</h2>
                    <p id="pp-info" class="text-xs text-gray-500 font-bold mb-4">견종 · 성별 · 나이</p>
                    <div id="pp-tags" class="flex flex-wrap gap-1 justify-center mb-6"></div>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-black mb-1">구조 경위 및 메모</p>
                    <p id="pp-memo" class="text-sm font-bold text-gray-700 leading-relaxed min-h-[40px]">메모가 없습니다.</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="openRecordFromProfile()" class="bg-white border-2 border-pink-400 text-pink-500 py-4 rounded-2xl font-black shadow-sm active:scale-95 transition-all flex flex-col items-center gap-1">
                    <span class="text-2xl">📝</span>
                    <span>일과 기록 작성</span>
                </button>
                <button onclick="openHistoryFromProfile()" class="bg-pink-500 text-white py-4 rounded-2xl font-black shadow-md active:scale-95 transition-all flex flex-col items-center gap-1">
                    <span class="text-2xl">📅</span>
                    <span>일과 기록 열람</span>
                </button>
            </div>
            
            <button onclick="askDeleteAnimal()" class="w-full py-3 mt-4 text-xs text-red-400 font-bold underline active:scale-95">이 동물의 프로필 영구 삭제하기</button>
        </div>
        <input type="hidden" id="pp-animal-id" value="">
    </div>

    <div id="history-panel" class="slide-panel fixed inset-0 bg-gray-50 z-[150] transform translate-x-full flex flex-col h-full overflow-hidden">
        <div class="px-5 py-4 bg-white border-b border-pink-100 flex justify-between items-center shadow-sm sticky top-0 z-10 pt-[max(env(safe-area-inset-top),16px)]">
            <div class="flex items-center gap-3">
                <button onclick="closeHistoryPanel()" class="text-gray-400 text-3xl font-black active:scale-90 transition-transform">&lsaquo;</button>
                <div id="hp-header-info" class="flex items-center gap-2"></div>
            </div>
        </div>
        <div id="hp-logs-container" class="flex-1 overflow-y-auto p-5 pb-10"></div>
        <input type="hidden" id="hp-animal-id" value="">
    </div>

    <div id="record-panel" class="slide-panel fixed inset-0 bg-white z-[200] transform translate-x-full flex flex-col h-full overflow-hidden">
        <div class="px-5 py-4 bg-white border-b border-pink-100 flex justify-between items-center shadow-sm sticky top-0 z-10 pt-[max(env(safe-area-inset-top),16px)]">
            <div class="flex items-center gap-3">
                <button onclick="closeRecordPanel()" class="text-gray-400 text-3xl font-black active:scale-90 transition-transform">&lsaquo;</button>
                <div id="rp-header-info" class="flex items-center gap-2"></div>
            </div>
            <button onclick="resetRecordForm()" class="text-xs bg-gray-100 text-gray-500 px-3 py-1.5 rounded-lg font-bold">선택 해제</button>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-8 pb-32">
            <div class="bg-pink-50 rounded-xl p-3 text-center">
                <p class="text-xs font-bold text-pink-500">현재 <span class="font-black text-pink-600 underline" id="current-trainer-display"></span>님의 이름으로 <span id="record-action-text">기록</span>됩니다.</p>
            </div>

            <section class="border border-pink-100 p-4 rounded-2xl bg-white shadow-sm">
                <h3 class="text-lg font-black text-gray-800 mb-3">🐕 산책 기록</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-inactive">오전</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-inactive">오후</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-inactive">저녁</button>
                </div>
                <input type="text" id="walk-duration" placeholder="산책 시간 (예: 45분, 10:00~10:45)" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300 mb-3">
                <p class="text-xs font-bold text-gray-500 mb-2">산책 간 아이의 컨디션</p>
                <div class="flex gap-2">
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-inactive text-xl">🟢 좋음</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-inactive text-xl">🟡 평범</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-inactive text-xl">🔴 나쁨</button>
                </div>
            </section>
            
            <section class="border border-pink-100 p-4 rounded-2xl bg-white shadow-sm">
                <h3 class="text-lg font-black text-gray-800 mb-3">🥣 밥 급여 기록</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleSelect(this, 'meal-time')" class="meal-time-btn flex-1 py-2 rounded-xl border btn-inactive">아침</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-time')" class="meal-time-btn flex-1 py-2 rounded-xl border btn-inactive">저녁</button>
                </div>
                <input type="text" id="meal-amount" placeholder="급여량 (예: 150g, 종이컵 1컵)" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300 mb-3">
                <p class="text-xs font-bold text-gray-500 mb-2">밥 먹은 정도</p>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">완식</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">조금 남김</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">많이 남김</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">먹지 않음</button>
                </div>
            </section>

            <section class="border border-pink-100 p-4 rounded-2xl bg-white shadow-sm">
                <h3 class="text-lg font-black text-gray-800 mb-3">💩 배변 기록</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleMulti(this)" id="potty-type-feces" class="potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive">대변</button>
                    <button type="button" onclick="toggleMulti(this)" id="potty-type-urine" class="potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive">소변</button>
                </div>
                <div class="flex gap-2 mb-2 overflow-x-auto hide-scrollbar">
                    <button type="button" onclick="setPottyMemo('정상 (양호)')" class="whitespace-nowrap px-3 py-1.5 rounded-lg border border-pink-100 text-xs font-bold bg-pink-50 text-pink-500 active:scale-95">정상 (양호)</button>
                    <button type="button" onclick="setPottyMemo('묽은 변')" class="whitespace-nowrap px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold bg-white text-gray-600 active:scale-95">묽은 변</button>
                    <button type="button" onclick="setPottyMemo('설사')" class="whitespace-nowrap px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold bg-white text-gray-600 active:scale-95">설사</button>
                    <button type="button" onclick="setPottyMemo('혈변/혈뇨')" class="whitespace-nowrap px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold bg-white text-red-500 active:scale-95">혈변/혈뇨</button>
                </div>
                <input type="text" id="potty-memo" placeholder="세부 상태 입력 (예: 소변만 봄, 특이사항 없음 등)" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300">
            </section>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-pink-100 p-4 pb-[max(env(safe-area-inset-bottom),16px)] shadow-[0_-5px_15px_rgba(0,0,0,0.03)] z-20">
            <button id="btn-save-record" onclick="saveDetailLog()" class="w-full py-4 pink-gradient text-white font-black text-lg rounded-2xl shadow-lg active:scale-95 transition-transform">
                작성한 항목만 저장하기
            </button>
            <input type="hidden" id="rp-animal-id" value="">
        </div>
    </div>

    <div id="custom-modal" class="modal-bg">
        <div class="bg-white w-[85%] max-w-xs rounded-[35px] p-8 text-center shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4"></div>
            <h3 id="modal-title" class="text-xl font-black mb-2 text-gray-800"></h3>
            <p id="modal-desc" class="text-gray-400 text-sm mb-6 font-bold"></p>
            <div id="modal-btns" class="flex gap-2"></div>
        </div>
    </div>

    <script>
        const CURRENT_TRAINER = "김현우 훈련사";
        
        let editingLogId = null;
        let editingLogOriginalData = null;
        let editingAnimalProfileId = null; 
        let currentSearchQuery = '';

        // [신규 추가] 견종/묘종 데이터베이스
        const dogBreeds = ['믹스견', '말티즈', '푸들', '포메라니안', '진돗개', '골든 리트리버', '비숑 프리제', '치와와', '시츄', '요크셔테리어', '직접 입력'];
        const catBreeds = ['코리안 숏헤어', '페르시안', '러시안 블루', '샴', '먼치킨', '랙돌', '스코티시 폴드', '브리티시 숏헤어', '직접 입력'];

        const firebaseConfig = {
            apiKey: "AIzaSyAitCQVYKsqytLzT_O9_k0lXT7bAsPhjLY",
            authDomain: "naepumae-center.firebaseapp.com",
            databaseURL: "https://naepumae-center-default-rtdb.firebaseio.com",
            projectId: "naepumae-center",
            storageBucket: "naepumae-center.firebasestorage.app",
            messagingSenderId: "591209155709",
            appId: "1:591209155709:web:348eb8e2aca66a355f7514"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let animals = [];
        let currentPhotoBase64 = null;
        let currentFilter = 'all'; 

        function initApp() {
            document.getElementById('current-trainer-display').innerText = CURRENT_TRAINER;
            showView('list');
        }

        database.ref('animals').on('value', (snapshot) => {
            const data = snapshot.val();
            animals = [];
            if (data) {
                Object.keys(data).forEach(key => animals.push(data[key]));
                animals.sort((a, b) => b.id - a.id);
            }
            renderFilters();
            if (!document.getElementById('view-list').classList.contains('hidden')) renderTasks();

            const profilePanel = document.getElementById('profile-panel');
            if(!profilePanel.classList.contains('translate-x-full')) {
                const activeId = document.getElementById('pp-animal-id').value;
                const activeAni = animals.find(a => a.id == activeId);
                if(activeAni) populateProfilePanel(activeAni); 
            }

            const historyPanel = document.getElementById('history-panel');
            if(!historyPanel.classList.contains('translate-x-full')) {
                const activeId = document.getElementById('hp-animal-id').value;
                const activeAni = animals.find(a => a.id == activeId);
                if(activeAni) renderHistory(activeAni);
            }
        });

        function showView(view) {
            document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            
            const navList = document.getElementById('nav-list');
            const navReg = document.getElementById('nav-reg');
            
            navList.classList.toggle('opacity-40', view !== 'list');
            navList.classList.toggle('opacity-100', view === 'list');
            navReg.classList.toggle('opacity-40', view !== 'reg');
            navReg.classList.toggle('opacity-100', view === 'reg');

            window.scrollTo(0,0);
            
            if(view === 'list') {
                renderTasks();
            } else if (view === 'reg' && !editingAnimalProfileId) {

            }

        function renderFilters() {

            const filters = [
                { id: 'all', label: '전체 보기' },
                { id: 'dog', label: '개 🐶' },

                { id: 'protecting', label: '보호 중 🏡' },

                <button onclick="setFilter('${f.id}')" class="whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-black transition-all ${currentFilter === f.id ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-pink-300 border border-pink-100'}">${f.label}</button>

        // [신규 추가] 종류 선택에 따른 품종 드롭다운 변경 로직
        function updateBreeds() {
            const typeSelect = document.getElementById('in-type');
            const breedSelect = document.getElementById('in-breed');
            const breedCustom = document.getElementById('in-breed-custom');
            
            breedSelect.innerHTML = '<option value="" disabled selected>품종 선택</option>';
            breedCustom.classList.add('hidden');
            breedCustom.value = '';

            let list = [];
            if(typeSelect.value === '개') list = dogBreeds;
            else if(typeSelect.value === '고양이') list = catBreeds;

            list.forEach(breed => {
                const opt = document.createElement('option');
                opt.value = breed;
                opt.innerText = breed;
                breedSelect.appendChild(opt);
            });
        }

        // [신규 추가] 직접 입력 선택 시 텍스트 박스 노출
        function checkCustomBreed() {
            const breedSelect = document.getElementById('in-breed');
            const breedCustom = document.getElementById('in-breed-custom');
            
            if(breedSelect.value === '직접 입력') {
                breedCustom.classList.remove('hidden');
            } else {
                breedCustom.classList.add('hidden');
                breedCustom.value = '';
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const max_size = 500; 
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    const previewArea = document.getElementById('photo-preview');
                    previewArea.style.backgroundImage = `url(${currentPhotoBase64})`;
                    document.getElementById('photo-placeholder').classList.add('hidden');
                    document.getElementById('del-photo-btn').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function removePhoto(event) {
            if(event) event.stopPropagation();
            currentPhotoBase64 = null;
            document.getElementById('photo-preview').style.backgroundImage = 'none';
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('del-photo-btn').classList.add('hidden');
            document.getElementById('in-photo').value = '';
        }

            document.getElementById('btn-save-animal').innerText = "보호 동물 등록하기";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            
            document.getElementById('in-name').value = "";
            document.getElementById('in-type').value = "";
            updateBreeds();
            document.getElementById('in-gender').value = "";
            document.getElementById('in-age').value = "";
            document.getElementById('in-status').value = "보호 중 🏡";

            // 성격 칩스 리셋
            document.querySelectorAll('.per-btn').forEach(btn => {
                btn.classList.remove('btn-active', 'bg-pink-100', 'text-pink-600', 'border-pink-300');

        function saveAnimal() {
            document.querySelectorAll('input, textarea, select').forEach(el => el.blur());
            const nameEl = document.getElementById('in-name');
            const name = nameEl.value.trim();
            if(!name) { openModal('error', '이름을 적어주세요!', '아이의 이름을 입력해야 완료됩니다.'); return; }
            
            // 품종 데이터 추출 (직접입력 포함)
            let breedVal = document.getElementById('in-breed').value;
            if(breedVal === '직접 입력') breedVal = document.getElementById('in-breed-custom').value.trim();
            if(!breedVal) breedVal = '미상';

            // 다중 성격 데이터 추출
            const selectedPersonalities = Array.from(document.querySelectorAll('.per-btn.btn-active')).map(b => b.innerText);
            
            const targetId = editingAnimalProfileId ? editingAnimalProfileId : Date.now();
            
            let saveObj = {
                id: targetId, 
                photo: currentPhotoBase64, 
                name: name,
                type: document.getElementById('in-type').value || '미상',
                breed: breedVal,
                gender: document.getElementById('in-gender').value || '미정',
                age: document.getElementById('in-age').value || '미상',
                status: document.getElementById('in-status').value || '보호 중 🏡',
                personality: selectedPersonalities.join(', ') || '정보없음',
                memo: document.getElementById('in-memo').value || ''
            };

            if(editingAnimalProfileId) {
                const existingAni = animals.find(a => a.id === editingAnimalProfileId);
                if(existingAni && existingAni.daily_logs) {
                    saveObj.daily_logs = existingAni.daily_logs;
                }
                if(!currentPhotoBase64 && existingAni && existingAni.photo) {
                    saveObj.photo = existingAni.photo;
                }
            }

            database.ref('animals/' + targetId).set(saveObj).then(() => {
                const msgTitle = editingAnimalProfileId ? '수정 완료!' : '등록 성공! ✨';
                resetRegForm();
                openModal('success', msgTitle, `${name}의 정보가 클라우드에 저장되었습니다.`);
                showView('list');
                
                if(editingAnimalProfileId) {
                    document.getElementById('profile-panel').classList.remove('translate-x-full');
                }
            });
        }

        // [수정됨] 신규 필터 로직 반영
        function renderTasks() {
            const container = document.getElementById('task-container');
            const filteredAnimals = animals.filter(a => {
                // 상단 필터 체크
                if (currentFilter === 'dog' && a.type !== '개') return false;
                if (currentFilter === 'cat' && a.type !== '고양이') return false;
                if (currentFilter === 'protecting' && !(a.status && a.status.includes('보호 중'))) return false;
                if (currentFilter === 'temp' && !(a.status && a.status.includes('임시보호'))) return false;
                if (currentFilter === 'adopt' && !(a.status && a.status.includes('입양 대기'))) return false;
                
                // 검색어 체크
                if (currentSearchQuery) {
                    const nameMatch = a.name && a.name.toLowerCase().includes(currentSearchQuery);
                    const breedMatch = a.breed && a.breed.toLowerCase().includes(currentSearchQuery);
                    if (!nameMatch && !breedMatch) return false; 
                }

                return true;
            });

            if(filteredAnimals.length === 0) { 
                container.innerHTML = '<div class="text-center py-20 text-gray-400 font-bold">조건에 맞는 아이가 없습니다.</div>'; 
                return; 
            }
            
            container.innerHTML = `<h3 class="font-black text-gray-400 px-2 mb-3 text-[10px] uppercase tracking-widest">목록 (${filteredAnimals.length})</h3>`;
            
            filteredAnimals.forEach(a => {
                const photoHtml = a.photo ? `<div class="w-16 h-16 rounded-[18px] bg-cover bg-center shrink-0 shadow-sm border border-pink-50" style="background-image: url(${a.photo})"></div>` : `<div class="w-16 h-16 rounded-[18px] bg-pink-50 flex items-center justify-center shrink-0 text-pink-200 text-2xl">🐾</div>`;
                
                // 상태별 뱃지 컬러 동적 부여
                let badgeColor = 'bg-blue-50 text-blue-500'; // 기본: 보호 중
                if(a.status && a.status.includes('입양 대기')) badgeColor = 'bg-pink-500 text-white shadow-md';
                else if(a.status && a.status.includes('임시보호')) badgeColor = 'bg-yellow-100 text-yellow-600 shadow-sm border border-yellow-200';
                
                // 상태명 정제
                const shortStatus = a.status ? a.status.split(' ')[0] + ' ' + a.status.split(' ')[1] : '보호 중 🏡';

                container.innerHTML += `
                    <div class="card border-pink-50 mb-4 hover:shadow-lg transition-all cursor-pointer active:scale-[0.98]" onclick="openProfilePanel(${a.id})">
                        <div class="flex items-center gap-4">
                            ${photoHtml}
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="px-2 py-0.5 rounded-md text-[9px] font-black ${badgeColor}">${shortStatus}</span>
                                    <span class="text-gray-300 text-xl">&rsaquo;</span>
                                </div>
                                <h3 class="font-black text-lg text-gray-800 truncate">${a.name}</h3>
                                <p class="text-[10px] text-gray-400 font-bold">${a.type||'동물'} · ${a.breed} · ${a.gender}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

                document.getElementById('pp-photo').style.backgroundImage = `url(${ani.photo})`;
                document.getElementById('pp-photo').innerText = '';
            } else {
                document.getElementById('pp-photo').style.backgroundImage = 'none';
                document.getElementById('pp-photo').innerText = '🐾';
            }
            
            const shortStatus = ani.status ? ani.status.split(' ')[0] + ' ' + ani.status.split(' ')[1] : '보호 중 🏡';

            else if(ani.status && ani.status.includes('임시보호')) badgeClass = 'bg-yellow-400 text-white';

        function editAnimalProfile() {
            const id = document.getElementById('pp-animal-id').value;
            const ani = animals.find(a => a.id == id);
            if(!ani) return;

            editingAnimalProfileId = ani.id;
            
            document.getElementById('in-name').value = ani.name;
            document.getElementById('in-type').value = ani.type || '개'; // 폴백
            updateBreeds();

            // 품종 값이 기본 리스트에 있는지 확인하여 처리
            const breedSelect = document.getElementById('in-breed');
            let isCustom = true;
            for(let i=0; i<breedSelect.options.length; i++) {
                if(breedSelect.options[i].value === ani.breed) { isCustom = false; break; }
            }
            if(isCustom && ani.breed && ani.breed !== '미상') {
                breedSelect.value = '직접 입력';
                checkCustomBreed();
                document.getElementById('in-breed-custom').value = ani.breed;
            } else {
                breedSelect.value = ani.breed;
                checkCustomBreed();
            }

            document.getElementById('in-gender').value = ani.gender;
            document.getElementById('in-age').value = ani.age;
            document.getElementById('in-status').value = ani.status;
            document.getElementById('in-memo').value = ani.memo;

            // 성격 칩스 복원
            const pArr = ani.personality ? ani.personality.split(',').map(s=>s.trim()) : [];
            document.querySelectorAll('.per-btn').forEach(btn => {
                if(pArr.includes(btn.innerText)) {
                    btn.classList.add('btn-active', 'bg-pink-100', 'text-pink-600', 'border-pink-300');
                    btn.classList.remove('btn-inactive', 'bg-white', 'text-gray-500', 'border-gray-200');
                } else {
                    btn.classList.remove('btn-active', 'bg-pink-100', 'text-pink-600', 'border-pink-300');
                    btn.classList.add('btn-inactive', 'bg-white', 'text-gray-500', 'border-gray-200');
                }
            });

            if(ani.photo) {
                currentPhotoBase64 = ani.photo; 
                document.getElementById('photo-preview').style.backgroundImage = `url(${ani.photo})`;
                document.getElementById('photo-placeholder').classList.add('hidden');
                document.getElementById('del-photo-btn').classList.remove('hidden');
            } else {
                removePhoto();
            }

            document.getElementById('reg-title').innerText = "📝 보호 동물 정보 수정";
            document.getElementById('btn-save-animal').innerText = "수정 완료하기";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');

            closeProfilePanel();
            showView('reg');
        }

            document.getElementById('hp-animal-id').value = id; 

            const photoHtml = ani.photo ? `<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-pink-100" style="background-image: url(${ani.photo})"></div>` : `<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl">🐾</div>`;

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        function renderHistory(ani) {
            const container = document.getElementById('hp-logs-container');
            
            if(!ani.daily_logs || Object.keys(ani.daily_logs).length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-400 font-bold mt-20"><span class="text-4xl mb-3">📭</span><p>아직 작성된 일과 기록이 없습니다.</p></div>`;
                return;
            }

            const logsByDate = {};
            Object.entries(ani.daily_logs).forEach(([logKey, log]) => {
                log.id = logKey; 
                const dateKey = log.date_str || "날짜 미상";
                if(!logsByDate[dateKey]) logsByDate[dateKey] = [];
                logsByDate[dateKey].push(log);
            });

            const sortedDates = Object.keys(logsByDate).sort((a, b) => b.localeCompare(a));

            container.innerHTML = sortedDates.map((date, index) => {
                const logs = logsByDate[date].sort((a,b) => b.timestamp - a.timestamp);
                const accId = `acc-date-${index}`;
                const isOpen = index === 0; 

                const logsHtml = logs.map(log => {
                    let content = '';
                    if(log.walk) content += `<div class="flex items-start gap-2 mb-1"><span class="text-base">🐕</span> <p><strong class="text-gray-900">산책:</strong> ${log.walk.time} / ${log.walk.duration} / ${log.walk.condition}</p></div>`;
                    if(log.meal) content += `<div class="flex items-start gap-2 mb-1"><span class="text-base">🥣</span> <p><strong class="text-gray-900">급여:</strong> ${log.meal.time} / ${log.meal.amount} / ${log.meal.status}</p></div>`;
                    if(log.potty) content += `<div class="flex items-start gap-2 mb-1"><span class="text-base">💩</span> <p><strong class="text-gray-900">배변:</strong> ${log.potty.type} / ${log.potty.memo}</p></div>`;

                    return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50 mb-3 relative group">
                        <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-50">
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500 font-bold">${log.time_str || ''}</span>
                                <span class="text-[10px] bg-pink-50 text-pink-500 px-2 py-1 rounded-md font-black">작성: ${log.trainer_name}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editLog(event, ${ani.id}, '${log.id}')" class="text-[10px] px-2 py-1 bg-gray-50 text-gray-500 rounded-md font-bold active:scale-95 hover:bg-gray-100">수정</button>
                                <button onclick="askDeleteLog(event, ${ani.id}, '${log.id}')" class="text-[10px] px-2 py-1 bg-red-50 text-red-500 rounded-md font-bold active:scale-95 hover:bg-red-100">삭제</button>
                            </div>
                        </div>
                        <div class="text-sm text-gray-700">${content}</div>
                    </div>`;
                }).join('');

                return `
                <div class="mb-4">
                    <button onclick="toggleAccordion('${accId}')" class="w-full flex justify-between items-center bg-pink-100 text-pink-600 px-4 py-3 rounded-2xl font-black shadow-sm active:scale-95 transition-all">
                        <span>📅 ${date}</span>
                        <span class="text-xs bg-white px-2 py-1 rounded-lg text-pink-400">${logs.length}건 기록 ▼</span>
                    </button>
                    <div id="${accId}" class="${isOpen ? '' : 'hidden'} mt-3 pl-2 border-l-2 border-pink-100">
                        ${logsHtml}
                    </div>
                </div>`;
            }).join('');
        }

        function askDeleteLog(event, animalId, logId) {
            event.stopPropagation();
            openModal('confirm', '기록을 삭제할까요?', '해당 시간의 일과 기록이 영구적으로 삭제됩니다.', () => {
                database.ref('animals/' + animalId + '/daily_logs/' + logId).remove();
            });
        }

        function editLog(event, animalId, logId) {
            event.stopPropagation();
            const ani = animals.find(a => a.id === animalId);
            if(!ani || !ani.daily_logs || !ani.daily_logs[logId]) return;

            const log = ani.daily_logs[logId];
            editingLogId = logId;
            editingLogOriginalData = log;

            document.getElementById('rp-animal-id').value = animalId;
            
            const photoHtml = ani.photo ? `<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-pink-100" style="background-image: url(${ani.photo})"></div>` : `<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl">🐾</div>`;
            document.getElementById('rp-header-info').innerHTML = `${photoHtml}<div class="flex flex-col"><span class="font-black text-gray-800 text-lg leading-tight">${ani.name}</span><span class="text-[10px] text-pink-400 font-bold">일과 기록 수정</span></div>`;
            
            document.getElementById('record-action-text').innerText = '수정';
            document.getElementById('btn-save-record').innerText = '수정된 내용 저장하기';

            clearFormFields(); 

            if(log.walk) {
                if(log.walk.time !== '-') setToggleState('.walk-time-btn', log.walk.time);
                if(log.walk.duration !== '-') document.getElementById('walk-duration').value = log.walk.duration;
                if(log.walk.condition !== '-') setToggleState('.walk-cond-btn', log.walk.condition, true);
            }
            if(log.meal) {
                if(log.meal.time !== '-') setToggleState('.meal-time-btn', log.meal.time);
                if(log.meal.amount !== '-') document.getElementById('meal-amount').value = log.meal.amount;
                if(log.meal.status !== '-') setToggleState('.meal-status-btn', log.meal.status);
            }
            if(log.potty) {
                if(log.potty.type && log.potty.type !== '-') {
                    if(log.potty.type.includes('대변')) forceMultiState('potty-type-feces', true);
                    if(log.potty.type.includes('소변')) forceMultiState('potty-type-urine', true);
                }
                if(log.potty.memo && log.potty.memo !== '특이사항 없음') document.getElementById('potty-memo').value = log.potty.memo;
            }

            closeHistoryPanel();
            document.getElementById('record-panel').classList.remove('translate-x-full');
        }

        function setToggleState(selector, text, isPartial = false) {
            document.querySelectorAll(selector).forEach(btn => {
                if(isPartial ? btn.innerText.includes(text) : btn.innerText === text) {
                    btn.classList.remove('btn-inactive');
                    btn.classList.add('btn-active');
                }
            });
        }
        function forceMultiState(id, isActive) {
            const btn = document.getElementById(id);
            if(isActive) {
                btn.classList.remove('btn-inactive');
                btn.classList.add('btn-active');
            }
        }

        // [수정됨] 멀티 토글 (성격 칩스 포함) 시 비주얼 업데이트 추가
        function toggleMulti(clickedBtn) {
            if(clickedBtn.classList.contains('btn-active')) {
                clickedBtn.classList.remove('btn-active', 'bg-pink-100', 'text-pink-600', 'border-pink-300');
                clickedBtn.classList.add('btn-inactive', 'bg-white', 'text-gray-500', 'border-gray-200');
            } else {
                clickedBtn.classList.remove('btn-inactive', 'bg-white', 'text-gray-500', 'border-gray-200');
                clickedBtn.classList.add('btn-active', 'bg-pink-100', 'text-pink-600', 'border-pink-300');
            }
        }

        function toggleSelect(clickedBtn, groupClass) {
            const wasActive = clickedBtn.classList.contains('btn-active');
            document.querySelectorAll(`.${groupClass}-btn`).forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('btn-inactive');
            });
            if (!wasActive) {
                clickedBtn.classList.remove('btn-inactive');
                clickedBtn.classList.add('btn-active');
            }
        }

        function setPottyMemo(text) {
            document.getElementById('potty-memo').value = text;
        }

        function clearFormFields() {
            ['walk-time', 'walk-cond', 'meal-time', 'meal-status'].forEach(cls => {
                document.querySelectorAll(`.${cls}-btn`).forEach(b => {
                    b.classList.remove('btn-active');
                    b.classList.add('btn-inactive');
                });
            });
            document.getElementById('potty-type-feces').className = 'potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive';
            document.getElementById('potty-type-urine').className = 'potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive';
            
            document.getElementById('walk-duration').value = '';
            document.getElementById('meal-amount').value = '';
            document.getElementById('potty-memo').value = '';
        }

        function resetRecordForm() {
            editingLogId = null;
            editingLogOriginalData = null;
            document.getElementById('record-action-text').innerText = '기록';
            document.getElementById('btn-save-record').innerText = '작성한 항목만 저장하기';
            clearFormFields();
        }

        function openRecordPanel(id) {
            const ani = animals.find(a => a.id === id);
            if(!ani) return;
            document.getElementById('rp-animal-id').value = id;
            
            const photoHtml = ani.photo ? `<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-pink-100" style="background-image: url(${ani.photo})"></div>` : `<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl">🐾</div>`;
            document.getElementById('rp-header-info').innerHTML = `${photoHtml}<div class="flex flex-col"><span class="font-black text-gray-800 text-lg leading-tight">${ani.name}</span><span class="text-[10px] text-pink-400 font-bold">일과 기록 작성</span></div>`;
            
            resetRecordForm(); 
            document.getElementById('record-panel').classList.remove('translate-x-full');
        }

        function closeRecordPanel() {
            document.getElementById('record-panel').classList.add('translate-x-full');
            document.activeElement.blur();
        }

        function saveDetailLog() {
            const id = document.getElementById('rp-animal-id').value;
            if(!id) return;

            const walkTimeBtn = document.querySelector('.walk-time-btn.btn-active');
            const walkTime = walkTimeBtn ? walkTimeBtn.innerText : null;
            const walkDuration = document.getElementById('walk-duration').value.trim();
            const walkCondBtn = document.querySelector('.walk-cond-btn.btn-active');
            const walkCond = walkCondBtn ? walkCondBtn.innerText.split(' ')[1] : null;

            const mealTimeBtn = document.querySelector('.meal-time-btn.btn-active');
            const mealTime = mealTimeBtn ? mealTimeBtn.innerText : null;
            const mealAmount = document.getElementById('meal-amount').value.trim();
            const mealStatusBtn = document.querySelector('.meal-status-btn.btn-active');
            const mealStatus = mealStatusBtn ? mealStatusBtn.innerText : null;

            const pottyTypes = [];
            if(document.getElementById('potty-type-feces').classList.contains('btn-active')) pottyTypes.push("대변");
            if(document.getElementById('potty-type-urine').classList.contains('btn-active')) pottyTypes.push("소변");
            const pottyMemo = document.getElementById('potty-memo').value.trim();

            if(!walkTime && !walkDuration && !mealTime && !mealAmount && pottyTypes.length === 0 && !pottyMemo) {
                openModal('error', '빈 기록입니다', '최소 하나 이상의 항목(산책, 급여, 배변)을 작성해주세요.');
                return;
            }

            let logData = { trainer_name: CURRENT_TRAINER };

            if(editingLogId && editingLogOriginalData) {
                logData.timestamp = editingLogOriginalData.timestamp;
                logData.date_str = editingLogOriginalData.date_str;
                logData.time_str = editingLogOriginalData.time_str;
            } else {
                const now = new Date();
                logData.timestamp = Date.now();
                logData.date_str = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
                logData.time_str = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            }

            if(walkTime || walkDuration || walkCond) {
                logData.walk = { time: walkTime || '-', duration: walkDuration || '-', condition: walkCond || '-' };
            } else { logData.walk = null; } 

            if(mealTime || mealAmount || mealStatus) {
                logData.meal = { time: mealTime || '-', amount: mealAmount || '-', status: mealStatus || '-' };
            } else { logData.meal = null; }

            if(pottyTypes.length > 0 || pottyMemo) {
                logData.potty = { type: pottyTypes.join(', ') || '-', memo: pottyMemo || '특이사항 없음' };
            } else { logData.potty = null; }

            const targetLogId = editingLogId ? editingLogId : Date.now();

            database.ref('animals/' + id + '/daily_logs/' + targetLogId).update(logData).then(() => {
                closeRecordPanel();
                if(editingLogId) {
                    openModal('success', '수정 완료!', '기록이 성공적으로 수정되었습니다.');
                } else {
                    openModal('success', '기록 완료!', `작성하신 항목이 저장되었습니다.`);
                }
            });
        }

        function openModal(type, title, desc, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const btns = document.getElementById('modal-btns');
            document.getElementById('modal-icon').innerText = type === 'success' ? '✨' : (type === 'error' ? '💡' : '🗑️');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.add('active');
            if (type === 'confirm') {
                btns.innerHTML = `<button onclick="closeModal()" class="flex-1 py-4 bg-gray-50 text-gray-400 font-black rounded-2xl">취소</button><button id="modal-confirm-btn" class="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl shadow-md">확인</button>`;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            } else {
                btns.innerHTML = `<button onclick="closeModal()" class="w-full py-4 pink-gradient text-white font-black rounded-2xl shadow-md">확인</button>`;
            }
        }
        function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }
    </script>
</body>
</html>
