<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>내품애센터 스마트 관리 앱</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #ffe4e9; box-shadow: 0 10px 20px rgba(255, 105, 180, 0.03); }
        .tab-active { color: #ff69b4; border-bottom: 3px solid #ff69b4; }
        .modal-bg { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px); z-index: 10000; position: fixed; inset: 0; display: none; align-items: center; justify-content: center; }
        .modal-bg.active { display: flex; }
        #photo-preview { background-size: cover; background-position: center; transition: all 0.3s; }
        
        .content-area { padding-bottom: 160px; position: relative; z-index: 10; }
        nav { z-index: 50; position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; border-top: 1px solid #ffe4e9; }
        
        .save-btn { cursor: pointer; position: relative; z-index: 100; touch-action: manipulation; -webkit-appearance: none; }
        .save-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 가로 스크롤 숨김 (필터용) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="max-w-md mx-auto p-4">
    <div class="content-area">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-black text-[#ff69b4] mb-1">내품애 센터</h1>
            <p class="text-gray-500 text-sm">반려동물과 행복한 서대문</p>
        </header>

        <div class="flex justify-around mb-6 bg-white rounded-2xl p-1 shadow-sm border border-pink-50">
            <button onclick="showView('reg')" id="tab-reg" class="flex-1 py-3 text-sm font-bold tab-active">아이 등록</button>
            <button onclick="showView('list')" id="tab-list" class="flex-1 py-3 text-sm font-bold text-gray-400">업무 관리</button>
        </div>

        <div id="view-reg" class="space-y-6">
            <div class="card space-y-4">
                <h2 class="text-lg font-bold text-gray-700">📸 신규 보호 동물 등록</h2>
                
                <div id="photo-preview" onclick="document.getElementById('in-photo').click()" class="w-full h-52 rounded-3xl bg-pink-50 flex items-center justify-center border-2 border-dashed border-pink-200 relative overflow-hidden">
                    <div id="photo-placeholder" class="text-center text-pink-300">
                        <span class="text-5xl">📸</span>
                        <p class="text-xs font-bold mt-2">사진 선택</p>
                    </div>
                    <input type="file" id="in-photo" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                    <button id="del-photo-btn" onclick="removePhoto(event)" class="hidden absolute top-3 right-3 bg-white text-pink-500 px-3 py-1 rounded-full text-xs font-bold shadow-md">삭제</button>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <input type="text" id="in-name" placeholder="이름 (필수)" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 font-bold">
                    <input type="text" id="in-breed" placeholder="종류/견종" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold">
                    <select id="in-gender" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="" disabled selected>성별</option>
                        <option value="남아">남아</option>
                        <option value="여아">여아</option>
                    </select>
                    
                    <input type="text" id="in-age" placeholder="추정 나이" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold">
                    <select id="in-status" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="보호 중 🏡" selected>보호 중 🏡</option>
                        <option value="훈련 중 🚧">훈련 중 🚧</option>
                        <option value="입양 대기 💝">입양 대기 💝</option>
                    </select>

                    <input type="text" id="in-personality" placeholder="성격 (쉼표 구분)" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold w-full">
                    <textarea id="in-memo" placeholder="메모 및 특이사항" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none h-24 bg-pink-50/20 text-sm font-bold"></textarea>
                    
                    <button type="button" onclick="saveAnimal(); return false;" class="save-btn col-span-2 py-5 pink-gradient text-white font-black rounded-2xl shadow-lg mt-2 transition-all">
                        보호 동물 등록하기
                    </button>
                </div>
            </div>

            <div id="filter-container" class="flex gap-2 px-2 overflow-x-auto hide-scrollbar"></div>
            
            <div id="reg-list" class="space-y-4"></div>
        </div>

        <div id="view-list" class="hidden space-y-4">
            <div id="task-container" class="space-y-4"></div>
        </div>
    </div>

    <nav class="flex justify-around py-4 shadow-lg rounded-t-3xl">
        <button onclick="showView('reg')" class="flex flex-col items-center gap-1">
            <span class="text-2xl">🐾</span><span class="text-[10px] font-bold text-pink-500">아이들</span>
        </button>
        <button onclick="showView('list')" class="flex flex-col items-center gap-1">
            <span class="text-2xl opacity-30">📋</span><span class="text-[10px] font-bold text-gray-400">업무관리</span>
        </button>
    </nav>

    <div id="custom-modal" class="modal-bg">
        <div class="bg-white w-full max-w-xs rounded-[32px] p-8 text-center shadow-2xl mx-4">
            <div id="modal-icon" class="text-5xl mb-4"></div>
            <h3 id="modal-title" class="text-xl font-bold mb-2"></h3>
            <p id="modal-desc" class="text-gray-500 text-sm mb-6"></p>
            <div id="modal-btns" class="flex gap-2"></div>
        </div>
    </div>

    <script>
        // 파이어베이스 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyAitCQVYKsqytLzT_O9_k0lXT7bAsPhjLY",
            authDomain: "naepumae-center.firebaseapp.com",
            databaseURL: "https://naepumae-center-default-rtdb.firebaseio.com",
            projectId: "naepumae-center",
            storageBucket: "naepumae-center.firebasestorage.app",
            messagingSenderId: "591209155709",
            appId: "1:591209155709:web:348eb8e2aca66a355f7514"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let animals = [];
        let currentPhotoBase64 = null;
        let currentFilter = 'all'; // 현재 선택된 필터 상태

        // 실시간 동기화
        database.ref('animals').on('value', (snapshot) => {
            const data = snapshot.val();
            animals = [];
            if (data) {
                Object.keys(data).forEach(key => animals.push(data[key]));
                animals.sort((a, b) => b.id - a.id);
            }
            renderFilters();
            renderRegList();
            if (!document.getElementById('view-list').classList.contains('hidden')) renderTasks();
        });

        function showView(view) {
            document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('tab-reg').className = view === 'reg' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            document.getElementById('tab-list').className = view === 'list' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            window.scrollTo(0,0);
            if(view === 'list') renderTasks();
        }

        // [추가] 필터 상태 변경 함수
        function setFilter(filterType) {
            currentFilter = filterType;
            renderFilters();
            renderRegList();
        }

        // [추가] 가로 스크롤 필터 버튼 렌더링
        function renderFilters() {
            const container = document.getElementById('filter-container');
            const filters = [
                { id: 'all', label: '전체 보기' },
                { id: 'cat', label: '고양이 🐱' },
                { id: 'adopt', label: '입양 대기 💝' }
            ];

            container.innerHTML = filters.map(f => `
                <button onclick="setFilter('${f.id}')" 
                    class="whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-black transition-all ${currentFilter === f.id ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-pink-300 border border-pink-100'}">
                    ${f.label}
                </button>
            `).join('');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const max_size = 500; 
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    const previewArea = document.getElementById('photo-preview');
                    previewArea.style.backgroundImage = `url(${currentPhotoBase64})`;
                    document.getElementById('photo-placeholder').classList.add('hidden');
                    document.getElementById('del-photo-btn').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function removePhoto(event) {
            if(event) event.stopPropagation();
            currentPhotoBase64 = null;
            document.getElementById('photo-preview').style.backgroundImage = 'none';
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('del-photo-btn').classList.add('hidden');
            document.getElementById('in-photo').value = '';
        }

        function saveAnimal() {
            document.querySelectorAll('input, textarea, select').forEach(el => el.blur());
            const nameEl = document.getElementById('in-name');
            const name = nameEl.value.trim();
            
            if(!name) { openModal('error', '이름을 적어주세요!', '아이의 이름을 입력해야 등록이 완료됩니다.'); return; }
            
            const newId = Date.now();
            const newAnimal = {
                id: newId,
                photo: currentPhotoBase64,
                name: name,
                breed: document.getElementById('in-breed').value || '미상',
                gender: document.getElementById('in-gender').value || '미정',
                age: document.getElementById('in-age').value || '미상',
                status: document.getElementById('in-status').value || '보호 중 🏡', // 뱃지 데이터 저장
                personality: document.getElementById('in-personality').value || '정보없음',
                memo: document.getElementById('in-memo').value || '',
                tasks: { walk:false, clean:false, meal:false }
            };

            database.ref('animals/' + newId).set(newAnimal).then(() => {
                nameEl.value = "";
                ['in-breed','in-age','in-personality','in-memo'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
                document.getElementById('in-gender').value = "";
                document.getElementById('in-status').value = "보호 중 🏡";
                removePhoto(); 
                openModal('success', '클라우드 등록 성공! ✨', `${name}의 정보가 모든 직원에게 공유됩니다.`);
            }).catch((error) => {
                openModal('error', '저장 오류', '인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요.');
            });
        }

        function renderRegList() {
            const container = document.getElementById('reg-list');
            
            // [추가] 선택된 필터에 맞게 목록 걸러내기
            const filteredAnimals = animals.filter(a => {
                if (currentFilter === 'cat') return a.breed.includes('고양이') || a.breed.includes('묘') || a.breed.includes('코숏');
                if (currentFilter === 'adopt') return a.status && a.status.includes('입양 대기');
                return true;
            });

            container.innerHTML = `<h3 class="font-bold text-gray-400 px-2 mt-4 mb-4 text-xs uppercase tracking-widest">목록 (${filteredAnimals.length})</h3>`;
            
            filteredAnimals.forEach(a => {
                const photoHtml = a.photo ? `<div class="w-20 h-20 rounded-2xl bg-cover bg-center shrink-0 shadow-sm" style="background-image: url(${a.photo})"></div>` : `<div class="w-20 h-20 rounded-2xl bg-pink-50 flex items-center justify-center shrink-0 text-pink-200 text-2xl">🐾</div>`;
                const tags = a.personality.split(',').map(tag => `<span class="text-[10px] bg-pink-50 text-pink-500 px-2 py-0.5 rounded-md font-bold">#${tag.trim()}</span>`).join(' ');
                
                // [추가] 시각적 상태 뱃지 렌더링
                const badgeColor = a.status && a.status.includes('입양 대기') ? 'bg-pink-500 text-white' : (a.status && a.status.includes('훈련 중') ? 'bg-orange-400 text-white' : 'bg-blue-100 text-blue-500');
                const badgeHtml = `<span class="px-2 py-0.5 rounded-md text-[9px] font-black shadow-sm ${badgeColor}">${a.status || '보호 중 🏡'}</span>`;

                container.innerHTML += `
                    <div class="card flex gap-4 relative items-center border-pink-50 mb-4 animate-fadeIn">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <div>
                                    ${badgeHtml}
                                    <h3 class="font-black text-xl text-gray-800 truncate mt-1">${a.name}</h3>
                                </div>
                                <button onclick="askDelete(${a.id})" class="text-xl text-gray-300 p-1 -mt-1">×</button>
                            </div>
                            <p class="text-[11px] text-gray-400 mb-2 font-bold">${a.breed} · ${a.gender} · ${a.age}</p>
                            <div class="flex flex-wrap gap-1">${tags}</div>
                        </div>
                        ${photoHtml}
                    </div>`;
            });
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            if(animals.length === 0) { container.innerHTML = '<div class="text-center py-20 text-gray-400 font-bold">등록된 동물이 없습니다.</div>'; return; }
            container.innerHTML = '';
            animals.forEach(a => {
                const photoHtml = a.photo ? `<div class="w-14 h-14 rounded-2xl bg-cover bg-center shrink-0 shadow-sm" style="background-image: url(${a.photo})"></div>` : `<div class="w-14 h-14 rounded-2xl bg-pink-50 flex items-center justify-center shrink-0 text-pink-200 text-xl">🐾</div>`;
                
                // [추가] 업무 진행도 계산 게이지 바
                const completedTasks = Object.values(a.tasks).filter(Boolean).length;
                const progressPercent = (completedTasks / 3) * 100;
                const progressBar = `
                    <div class="w-full bg-pink-50 rounded-full h-1.5 mt-2 mb-1">
                        <div class="bg-pink-400 h-1.5 rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                    </div>
                `;

                container.innerHTML += `
                    <div class="card border-pink-50 mb-4">
                        <div class="flex items-center gap-3 mb-4 pb-3 border-b border-pink-50">
                            ${photoHtml}
                            <div class="flex-1">
                                <span class="font-black text-gray-700 text-lg">${a.name}</span>
                                ${progressBar}
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${['walk', 'clean', 'meal'].map(type => `<button onclick="toggleTask(${a.id}, '${type}')" class="py-3 rounded-2xl border-2 text-[11px] font-black transition-all active:scale-95 ${a.tasks[type] ? 'pink-gradient text-white border-pink-400 shadow-md' : 'bg-white border-pink-50 text-pink-300'}">${type === 'walk' ? '산책' : type === 'clean' ? '청소' : '급여'}</button>`).join('')}
                        </div>
                    </div>`;
            });
        }

        function openModal(type, title, desc, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const btns = document.getElementById('modal-btns');
            document.getElementById('modal-icon').innerText = type === 'success' ? '✨' : (type === 'error' ? '💡' : '🗑️');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.add('active');
            if (type === 'confirm') {
                btns.innerHTML = `<button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 font-bold rounded-2xl">취소</button><button id="modal-confirm-btn" class="flex-1 py-4 bg-red-500 text-white font-bold rounded-2xl shadow-md">삭제</button>`;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            } else {
                btns.innerHTML = `<button onclick="closeModal()" class="w-full py-4 pink-gradient text-white font-bold rounded-2xl shadow-md">확인</button>`;
            }
        }
        function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }
        function askDelete(id) { database.ref('animals/' + id).remove(); }
        function toggleTask(id, type) { 
            const ani = animals.find(a => a.id === id); 
            if(ani) database.ref('animals/' + id + '/tasks/' + type).set(!ani.tasks[type]);
        }
    </script>
</body>
</html>
