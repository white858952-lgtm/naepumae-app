<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>내품애센터 스마트 관리 앱</title>
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        /* 터치 지연 방지 및 기본 셋팅 */
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; margin: 0; padding: 0; overflow-x: hidden; }
        
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 30px; padding: 22px; border: 1px solid #ffe4e9; box-shadow: 0 10px 25px rgba(255, 105, 180, 0.04); }
        
        /* 탭 디자인 */
        .tab-btn { position: relative; font-weight: 900; color: #d1d5db; transition: all 0.2s; }
        .tab-btn.active { color: #ff69b4; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 4px; background: #ff69b4; border-radius: 10px; }

        /* 등록 버튼 섹션 분리 (중요: 터치 간섭 방지) */
        .action-area { padding: 20px 0; border-top: 1px dashed #ffe4e9; margin-top: 10px; }
        .submit-btn { width: 100%; padding: 18px; border-radius: 20px; color: white; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer; display: block; text-align: center; -webkit-appearance: none; }
        .submit-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 하단 네비게이션 가시성 및 터치 영역 격리 */
        nav { height: 90px; padding-bottom: env(safe-area-inset-bottom); z-index: 100; pointer-events: none; }
        nav button { pointer-events: auto; } /* 버튼만 터치 가능하게 */

        /* 모달 최적화 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 40px; padding: 35px; width: 100%; max-width: 320px; text-align: center; transform: translateY(20px); opacity: 0; transition: all 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto p-5 pb-32">
    <header class="py-8 text-center">
        <h1 class="text-4xl font-black text-[#ff69b4] italic tracking-tight">내품애 센터</h1>
        <p class="text-gray-400 text-[10px] font-black uppercase tracking-[0.3em] mt-1">Smart Management v5</p>
    </header>

    <div class="flex justify-around mb-10 bg-white/50 rounded-3xl p-2 border border-white">
        <button onclick="showView('reg')" id="tab-reg" class="tab-btn active flex-1 py-3 text-sm uppercase">아이 등록</button>
        <button onclick="showView('list')" id="tab-list" class="tab-btn flex-1 py-3 text-sm uppercase">업무 관리</button>
    </div>

    <div id="view-reg" class="animate-in fade-in duration-500">
        <div class="card">
            <h2 class="text-xl font-black text-gray-800 mb-5 flex items-center gap-2">🐶 신규 보호견 등록</h2>
            
            <div onclick="document.getElementById('in-photo').click()" id="photo-preview" class="w-full h-52 rounded-[25px] bg-pink-50 border-2 border-dashed border-pink-100 flex items-center justify-center relative overflow-hidden mb-5">
                <div id="photo-placeholder" class="text-center">
                    <span class="text-5xl">📸</span>
                    <p class="text-[10px] font-black text-pink-300 mt-2 uppercase">Upload Photo</p>
                </div>
                <input type="file" id="in-photo" accept="image/*" class="hidden" onchange="handleFile(event)">
                <button id="del-photo" onclick="removePhoto(event)" class="hidden absolute top-4 right-4 bg-white text-pink-500 px-4 py-2 rounded-full text-[10px] font-black shadow-md">삭제</button>
            </div>

            <div class="space-y-3">
                <input type="text" id="in-name" placeholder="강아지 이름 (필수)" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-pink-200 font-bold outline-none">
                <div class="flex gap-2">
                    <input type="text" id="in-breed" placeholder="견종" class="flex-1 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                    <select id="in-gender" class="w-1/3 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold text-gray-400 outline-none appearance-none">
                        <option value="" disabled selected>성별</option>
                        <option value="남아">남아</option>
                        <option value="여아">여아</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="in-age" placeholder="나이" class="flex-1 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                    <input type="text" id="in-personality" placeholder="성격 (쉼표 구분)" class="flex-1 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                </div>
                <textarea id="in-memo" placeholder="메모 (구조 경위 등)" class="w-full p-4 rounded-2xl bg-gray-50 border-none h-24 text-sm font-bold outline-none"></textarea>
                
                <div class="action-area">
                    <button type="button" id="btn-save" class="submit-btn pink-gradient shadow-lg">
                        보호견 등록하기
                    </button>
                </div>
            </div>
        </div>

        <div id="reg-list" class="mt-10 space-y-4"></div>
    </div>

    <div id="view-list" class="hidden">
        <div id="task-container" class="space-y-4"></div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center bg-white/80 backdrop-blur-xl border-t border-pink-50 rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
    <button onclick="showView('reg')" class="flex flex-col items-center gap-1 p-5">
        <span class="text-2xl">🐾</span><span class="text-[9px] font-black text-pink-500 uppercase tracking-tighter">Dogs</span>
    </button>
    <button onclick="showView('list')" class="flex flex-col items-center gap-1 p-5">
        <span class="text-2xl opacity-20">📅</span><span class="text-[9px] font-black text-gray-300 uppercase tracking-tighter">Work</span>
    </button>
</nav>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target==this) closeModal()">
    <div class="modal-content">
        <div id="modal-icon" class="text-6xl mb-4"></div>
        <h3 id="modal-title" class="text-2xl font-black text-gray-800 mb-2"></h3>
        <p id="modal-desc" class="text-gray-400 text-sm font-bold mb-8 leading-relaxed"></p>
        <div id="modal-btns"></div>
    </div>
</div>

<script>
    let animals = JSON.parse(localStorage.getItem('naepumae_v5') || '[]');
    let currentPhoto = null;

    // [핵심] 버튼 터치 이벤트 리스너 (onclick 대신 직접 등록)
    const saveBtn = document.getElementById('btn-save');
    
    // 모바일 터치와 클릭 모두 대응
    const handleSaveTrigger = (e) => {
        e.preventDefault(); // 브라우저 기본 동작 방지
        saveAnimal();
    };

    saveBtn.addEventListener('touchstart', handleSaveTrigger, {passive: false});
    saveBtn.addEventListener('click', handleSaveTrigger);

    function showView(view) {
        document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
        document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
        document.getElementById('tab-reg').classList.toggle('active', view === 'reg');
        document.getElementById('tab-list').classList.toggle('active', view === 'list');
        window.scrollTo(0,0);
        if(view === 'list') renderTasks();
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            currentPhoto = event.target.result;
            const preview = document.getElementById('photo-preview');
            preview.style.backgroundImage = `url(${currentPhoto})`;
            document.getElementById('photo-placeholder').classList.add('hidden');
            document.getElementById('del-photo').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removePhoto(e) {
        e.stopPropagation();
        currentPhoto = null;
        document.getElementById('photo-preview').style.backgroundImage = 'none';
        document.getElementById('photo-placeholder').classList.remove('hidden');
        document.getElementById('del-photo').classList.add('hidden');
        document.getElementById('in-photo').value = '';
    }

    function saveAnimal() {
        // 입력 중인 키보드 강제 닫기 (좌표 오류 방지)
        document.querySelectorAll('input, textarea').forEach(el => el.blur());

        const nameInput = document.getElementById('in-name');
        const name = nameInput.value.trim();

        if(!name) {
            openModal('error', '이름이 빠졌어요!', '아이의 이름을 적어주셔야 보호 명단에 올릴 수 있어요.');
            return;
        }

        const newAni = {
            id: Date.now(),
            photo: currentPhoto,
            name: name,
            breed: document.getElementById('in-breed').value || '미상',
            gender: document.getElementById('in-gender').value || '미정',
            age: document.getElementById('in-age').value || '미상',
            personality: document.getElementById('in-personality').value || '정보없음',
            memo: document.getElementById('in-memo').value || '',
            tasks: { walk: false, clean: false, meal: false }
        };

        animals.unshift(newAni);
        localStorage.setItem('naepumae_v5', JSON.stringify(animals));

        // 필드 초기화
        nameInput.value = '';
        ['in-breed','in-age','in-personality','in-memo'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('in-gender').value = '';
        removePhoto({stopPropagation: ()=>{}});
        
        renderRegList();
        openModal('success', '등록 성공! ✨', `${name}이가 명단에 추가되었습니다.`);
    }

    function openModal(type, title, desc, onConfirm) {
        const overlay = document.getElementById('modal-overlay');
        const btns = document.getElementById('modal-btns');
        document.getElementById('modal-icon').innerText = type === 'success' ? '💝' : (type === 'error' ? '💡' : '🗑️');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;

        if (type === 'confirm') {
            btns.innerHTML = `
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-50 text-gray-400 font-black rounded-2xl">취소</button>
                    <button id="confirm-action" class="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg">삭제</button>
                </div>`;
            document.getElementById('confirm-action').onclick = () => { onConfirm(); closeModal(); };
        } else {
            btns.innerHTML = `<button onclick="closeModal()" class="w-full py-4 pink-gradient text-white font-black rounded-2xl shadow-lg">확인</button>`;
        }
        overlay.classList.add('active');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

    function renderRegList() {
        const container = document.getElementById('reg-list');
        container.innerHTML = `<h3 class="font-black text-gray-300 text-[10px] uppercase tracking-widest mb-4 ml-2">Current List (${animals.length})</h3>`;
        
        animals.forEach(a => {
            const photoImg = a.photo ? `<div class="w-16 h-16 rounded-2xl bg-cover bg-center shrink-0" style="background-image: url(${a.photo})"></div>` : `<div class="w-16 h-16 rounded-2xl bg-pink-50 flex items-center justify-center text-pink-200 text-2xl shrink-0">🐶</div>`;
            const tags = a.personality.split(',').map(t => `<span class="text-[9px] bg-pink-50 text-pink-400 px-2 py-0.5 rounded-md font-black">#${t.trim()}</span>`).join(' ');
            
            container.innerHTML += `
                <div class="card flex gap-4 items-center relative overflow-hidden border-pink-50 shadow-sm mb-4">
                    ${photoImg}
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center">
                            <h4 class="font-black text-lg text-gray-800 truncate">${a.name}</h4>
                            <button onclick="askDelete(${a.id})" class="text-gray-300 text-xl p-1">×</button>
                        </div>
                        <p class="text-[10px] text-gray-400 font-bold -mt-1 mb-2">${a.breed} · ${a.gender}</p>
                        <div class="flex flex-wrap gap-1">${tags}</div>
                    </div>
                </div>`;
        });
    }

    function askDelete(id) {
        openModal('confirm', '삭제할까요?', '기록이 영구적으로 삭제됩니다.', () => {
            animals = animals.filter(a => a.id !== id);
            localStorage.setItem('naepumae_v5', JSON.stringify(animals));
            renderRegList();
        });
    }

    function renderTasks() {
        const container = document.getElementById('task-container');
        if(animals.length === 0) { container.innerHTML = '<div class="py-20 text-center font-black text-gray-300 uppercase tracking-widest">No Data</div>'; return; }
        container.innerHTML = '';
        animals.forEach(a => {
            const photoImg = a.photo ? `<div class="w-12 h-12 rounded-xl bg-cover bg-center" style="background-image: url(${a.photo})"></div>` : `<div class="w-12 h-12 rounded-xl bg-pink-50 flex items-center justify-center text-pink-200">🐶</div>`;
            container.innerHTML += `
                <div class="card border-pink-50">
                    <div class="flex items-center gap-3 mb-4 pb-3 border-b border-pink-50">
                        ${photoImg}
                        <div><span class="font-black text-gray-700">${a.name}</span><p class="text-[9px] text-pink-300 font-black tracking-tighter uppercase">Daily Checklist</p></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        ${['walk', 'clean', 'meal'].map(t => `
                            <button onclick="toggleTask(${a.id}, '${t}')" class="py-3.5 rounded-xl border-2 text-[11px] font-black transition-all ${a.tasks[t] ? 'pink-gradient text-white border-pink-300 shadow-md' : 'bg-white border-pink-50 text-pink-100'}">
                                ${t==='walk'?'산책':t==='clean'?'청소':'급여'}
                            </button>
                        `).join('')}
                    </div>
                </div>`;
        });
    }

    function toggleTask(id, type) {
        const ani = animals.find(a => a.id === id);
        ani.tasks[type] = !ani.tasks[type];
        localStorage.setItem('naepumae_v5', JSON.stringify(animals));
        renderTasks();
    }

    // 초기 실행
    renderRegList();
</script>

</body>
</html>
