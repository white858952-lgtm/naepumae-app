<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내품애센터 스마트 관리 앱</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; }
        .text-hotpink { color: #ff69b4; }
        .bg-hotpink { background-color: #ff69b4; }
        .bg-mint { background-color: #4fd1c5; }
        .text-mint { color: #4fd1c5; }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #ffe4e9; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .input-field { width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid #ffe4e9; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #ff69b4; }
        .btn-primary { background-color: #ff69b4; color: white; padding: 0.75rem; border-radius: 0.75rem; font-weight: bold; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;
        const { 
            Dog, ClipboardList, Calendar, PlusCircle, 
            CheckCircle2, Circle, Trash2, Heart, Info 
        } = lucide;

        function App() {
            const [currentView, setCurrentView] = useState('registration');
            
            // 데이터 불러오기 (자동 저장 기능)
            const [animals, setAnimals] = useState(() => {
                const saved = localStorage.getItem('naepumae_animals');
                return saved ? JSON.parse(saved) : [];
            });
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('naepumae_tasks');
                return saved ? JSON.parse(saved) : [];
            });

            // 데이터가 바뀔 때마다 저장
            useEffect(() => {
                localStorage.setItem('naepumae_animals', JSON.stringify(animals));
                localStorage.setItem('naepumae_tasks', JSON.stringify(tasks));
            }, [animals, tasks]);

            const [formData, setFormData] = useState({
                name: '', breed: '', intakeDate: '', allergy: '', isNeutered: false, weight: ''
            });

            const handleRegister = (e) => {
                e.preventDefault();
                if (!formData.name) return;
                const newAnimal = { ...formData, id: Math.random().toString(36).substr(2, 9) };
                setAnimals([...animals, newAnimal]);
                const newTasks = [
                    { id: Math.random().toString(), animalId: newAnimal.id, type: 'walk', completed: false },
                    { id: Math.random().toString(), animalId: newAnimal.id, type: 'cleaning', completed: false },
                    { id: Math.random().toString(), animalId: newAnimal.id, type: 'meal', completed: false },
                    { id: Math.random().toString(), animalId: newAnimal.id, type: 'medication', completed: false },
                ];
                setTasks([...tasks, ...newTasks]);
                setFormData({ name: '', breed: '', intakeDate: '', allergy: '', isNeutered: false, weight: '' });
            };

            const toggleTask = (taskId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t));
            };

            const deleteAnimal = (id) => {
                if(confirm("정말 삭제하시겠습니까?")) {
                    setAnimals(animals.filter(a => a.id !== id));
                    setTasks(tasks.filter(t => t.animalId !== id));
                }
            };

            return (
                <div className="flex min-h-screen">
                    <aside className="w-64 bg-white border-r border-pink-50 flex flex-col shadow-sm hidden md:flex">
                        <div className="p-6">
                            <div className="flex items-center gap-2 text-hotpink mb-8">
                                <Heart size={24} fill="currentColor" />
                                <span className="font-bold text-lg tracking-tight">내품애 센터</span>
                            </div>
                            <nav className="space-y-2">
                                <SidebarItem icon={<PlusCircle size={20} />} label="개체 등록" active={currentView === 'registration'} onClick={() => setCurrentView('registration')} />
                                <SidebarItem icon={<ClipboardList size={20} />} label="오늘의 업무" active={currentView === 'tasks'} onClick={() => setCurrentView('tasks')} />
                                <SidebarItem icon={<Calendar size={20} />} label="이벤트 달력" active={currentView === 'calendar'} onClick={() => setCurrentView('calendar')} />
                            </nav>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <header className="mb-6 md:mb-10">
                            <h1 className="text-2xl md:text-3xl font-black text-hotpink mb-2">서대문 내품애센터 관리</h1>
                            <p className="text-gray-500 text-sm">반려동물과 함께하는 행복한 서대문</p>
                        </header>

                        <AnimatePresence mode="wait">
                            {currentView === 'registration' && (
                                <motion.div key="registration" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity:
