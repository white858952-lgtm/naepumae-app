<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>내품애센터 스마트 관리 앱</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; overflow-x: hidden; }
        .pink-gradient { background: linear-gradient(135deg, #ff69b4 0%, #ff85c0 100%); }
        .card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #ffe4e9; box-shadow: 0 10px 20px rgba(255, 105, 180, 0.03); }
        .tab-active { color: #ff69b4; border-bottom: 3px solid #ff69b4; }
        .modal-bg { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px); z-index: 10000; position: fixed; inset: 0; display: none; align-items: center; justify-content: center; }
        .modal-bg.active { display: flex; }
        #photo-preview { background-size: cover; background-position: center; transition: all 0.3s; }
        
        .content-area { padding-bottom: 160px; position: relative; z-index: 10; }
        nav { z-index: 50; position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; border-top: 1px solid #ffe4e9; box-shadow: 0 -5px 20px rgba(255,105,180,0.05); }
        
        .save-btn { cursor: pointer; position: relative; z-index: 100; touch-action: manipulation; -webkit-appearance: none; }
        .save-btn:active { transform: scale(0.96); opacity: 0.9; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 패널 애니메이션 */
        .slide-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 토글/체크버튼 활성화 스타일 */
        .btn-active { background-color: #fbcfe8; color: #db2777; border-color: #f472b6; font-weight: 900; }
        .btn-inactive { background-color: #f9fafb; color: #9ca3af; border-color: #e5e7eb; }
    </style>
</head>
<body class="max-w-md mx-auto p-4 relative" onload="initApp()">
    <div class="content-area" id="main-content">
        <header class="py-6 text-center">
            <h1 class="text-3xl font-black text-[#ff69b4] mb-1">내품애 센터</h1>
            <p class="text-gray-500 text-sm font-bold">반려동물과 행복한 서대문</p>
        </header>

        <div class="flex justify-around mb-6 bg-white rounded-2xl p-1 shadow-sm border border-pink-50">
            <button onclick="showView('list')" id="tab-list" class="flex-1 py-3 text-sm font-bold tab-active">업무 관리 (목록)</button>
            <button onclick="showView('reg')" id="tab-reg" class="flex-1 py-3 text-sm font-bold text-gray-400">신규 아이 등록</button>
        </div>

        <div id="view-list" class="space-y-4">
            <div id="filter-container" class="flex gap-2 px-2 overflow-x-auto hide-scrollbar mb-4"></div>
            <div id="task-container" class="space-y-4"></div>
        </div>

        <div id="view-reg" class="hidden space-y-6">
            <div class="card space-y-4">
                <h2 class="text-lg font-bold text-gray-700">📸 신규 보호 동물 등록</h2>
                
                <div id="photo-preview" onclick="document.getElementById('in-photo').click()" class="w-full h-52 rounded-3xl bg-pink-50 flex items-center justify-center border-2 border-dashed border-pink-200 relative overflow-hidden cursor-pointer">
                    <div id="photo-placeholder" class="text-center text-pink-300">
                        <span class="text-5xl">📸</span>
                        <p class="text-xs font-bold mt-2">사진 선택</p>
                    </div>
                    <input type="file" id="in-photo" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                    <button id="del-photo-btn" onclick="removePhoto(event)" class="hidden absolute top-3 right-3 bg-white text-pink-500 px-3 py-1 rounded-full text-[10px] font-black shadow-md z-20">사진 삭제</button>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <input type="text" id="in-name" placeholder="이름 (필수)" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 font-bold focus:bg-white focus:border-pink-300 transition-colors">
                    <input type="text" id="in-breed" placeholder="종류/견종" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold">
                    <select id="in-gender" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="" disabled selected>성별</option>
                        <option value="남아">남아</option>
                        <option value="여아">여아</option>
                    </select>
                    
                    <input type="text" id="in-age" placeholder="추정 나이" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold">
                    <select id="in-status" class="col-span-1 p-4 border border-pink-100 rounded-2xl outline-none bg-white text-gray-500 text-sm font-bold">
                        <option value="보호 중 🏡" selected>보호 중 🏡</option>
                        <option value="훈련 중 🚧">훈련 중 🚧</option>
                        <option value="입양 대기 💝">입양 대기 💝</option>
                    </select>

                    <input type="text" id="in-personality" placeholder="성격 (쉼표 구분)" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none bg-pink-50/20 text-sm font-bold w-full">
                    <textarea id="in-memo" placeholder="구조 경위 및 초기 메모" class="col-span-2 p-4 border border-pink-100 rounded-2xl outline-none h-24 bg-pink-50/20 text-sm font-bold"></textarea>
                    
                    <button type="button" onclick="saveAnimal(); return false;" class="save-btn col-span-2 py-5 pink-gradient text-white font-black rounded-2xl shadow-lg mt-2 transition-transform text-lg">
                        보호 동물 등록하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="flex justify-around py-4 shadow-lg rounded-t-[32px]">
        <button onclick="showView('list')" class="flex flex-col items-center gap-1">
            <span class="text-2xl">📋</span><span class="text-[10px] font-black text-pink-500">업무관리</span>
        </button>
        <button onclick="showView('reg')" class="flex flex-col items-center gap-1">
            <span class="text-2xl opacity-30 hover:opacity-100 transition-opacity">🐾</span><span class="text-[10px] font-black text-gray-400">아이등록</span>
        </button>
    </nav>

    <div id="history-panel" class="slide-panel fixed inset-0 bg-gray-50 z-[150] transform translate-x-full flex flex-col h-full overflow-hidden">
        <div class="px-5 py-4 bg-white border-b border-pink-100 flex justify-between items-center shadow-sm sticky top-0 z-10 pt-[max(env(safe-area-inset-top),16px)]">
            <div class="flex items-center gap-3">
                <button onclick="closeHistoryPanel()" class="text-gray-400 text-3xl font-black active:scale-90 transition-transform">&lsaquo;</button>
                <div id="hp-header-info" class="flex items-center gap-2"></div>
            </div>
        </div>
        <div id="hp-logs-container" class="flex-1 overflow-y-auto p-5 space-y-4 pb-10">
            </div>
    </div>

    <div id="record-panel" class="slide-panel fixed inset-0 bg-white z-[200] transform translate-x-full flex flex-col h-full overflow-hidden">
        <div class="px-5 py-4 bg-white border-b border-pink-100 flex justify-between items-center shadow-sm sticky top-0 z-10 pt-[max(env(safe-area-inset-top),16px)]">
            <div class="flex items-center gap-3">
                <button onclick="closeRecordPanel()" class="text-gray-400 text-3xl font-black active:scale-90 transition-transform">&lsaquo;</button>
                <div id="rp-header-info" class="flex items-center gap-2"></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-8 pb-32">
            <div class="bg-pink-50 rounded-xl p-3 text-center">
                <p class="text-xs font-bold text-pink-500">현재 <span class="font-black text-pink-600 underline" id="current-trainer-display"></span>님의 이름으로 자동 기록됩니다.</p>
            </div>

            <section>
                <h3 class="text-lg font-black text-gray-800 mb-3">🐕 산책 체크</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-active">오전</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-inactive">오후</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-time')" class="walk-time-btn flex-1 py-2 rounded-xl border btn-inactive">저녁</button>
                </div>
                <input type="number" id="walk-duration" placeholder="산책 시간 (분)" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300 mb-3">
                <p class="text-xs font-bold text-gray-500 mb-2">산책 간 아이의 컨디션</p>
                <div class="flex gap-2">
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-active text-xl">🟢 좋음</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-inactive text-xl">🟡 평범</button>
                    <button type="button" onclick="toggleSelect(this, 'walk-cond')" class="walk-cond-btn flex-1 py-3 rounded-2xl border btn-inactive text-xl">🔴 나쁨</button>
                </div>
            </section>
            
            <hr class="border-pink-50">

            <section>
                <h3 class="text-lg font-black text-gray-800 mb-3">🥣 밥 급여 체크</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleSelect(this, 'meal-time')" class="meal-time-btn flex-1 py-2 rounded-xl border btn-active">아침</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-time')" class="meal-time-btn flex-1 py-2 rounded-xl border btn-inactive">저녁</button>
                </div>
                <input type="number" id="meal-amount" placeholder="급여량 (g)" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300 mb-3">
                <p class="text-xs font-bold text-gray-500 mb-2">밥 먹은 정도</p>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-active text-sm">완식</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">조금 남김</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">많이 남김</button>
                    <button type="button" onclick="toggleSelect(this, 'meal-status')" class="meal-status-btn py-2 rounded-xl border btn-inactive text-sm">먹지 않음</button>
                </div>
            </section>

            <hr class="border-pink-50">

            <section>
                <h3 class="text-lg font-black text-gray-800 mb-3">💩 배변 체크</h3>
                <div class="flex gap-2 mb-3">
                    <button type="button" onclick="toggleMulti(this)" id="potty-type-feces" class="potty-type-btn flex-1 py-3 rounded-2xl border btn-active">대변</button>
                    <button type="button" onclick="toggleMulti(this)" id="potty-type-urine" class="potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive">소변</button>
                </div>
                <select id="potty-status" class="w-full p-4 border border-pink-100 rounded-2xl outline-none bg-gray-50 text-sm font-bold focus:border-pink-300 text-gray-600">
                    <option value="정상" selected>정상 (형태가 잡힌 변/맑은 소변)</option>
                    <option value="묽은 변">묽은 변</option>
                    <option value="설사">설사</option>
                    <option value="혈변/혈뇨">혈변/혈뇨 (주의)</option>
                </select>
            </section>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-pink-100 p-4 pb-[max(env(safe-area-inset-bottom),16px)] shadow-[0_-5px_15px_rgba(0,0,0,0.03)] z-20">
            <button onclick="saveDetailLog()" class="w-full py-4 pink-gradient text-white font-black text-lg rounded-2xl shadow-lg active:scale-95 transition-transform">
                일일 기록 저장하기
            </button>
            <input type="hidden" id="rp-animal-id" value="">
        </div>
    </div>

    <div id="custom-modal" class="modal-bg">
        <div class="bg-white w-[85%] max-w-xs rounded-[35px] p-8 text-center shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4"></div>
            <h3 id="modal-title" class="text-xl font-black mb-2 text-gray-800"></h3>
            <p id="modal-desc" class="text-gray-400 text-sm mb-6 font-bold"></p>
            <div id="modal-btns" class="flex gap-2"></div>
        </div>
    </div>

    <script>
        const CURRENT_TRAINER = "김현우 훈련사";

        const firebaseConfig = {
            apiKey: "AIzaSyAitCQVYKsqytLzT_O9_k0lXT7bAsPhjLY",
            authDomain: "naepumae-center.firebaseapp.com",
            databaseURL: "https://naepumae-center-default-rtdb.firebaseio.com",
            projectId: "naepumae-center",
            storageBucket: "naepumae-center.firebasestorage.app",
            messagingSenderId: "591209155709",
            appId: "1:591209155709:web:348eb8e2aca66a355f7514"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let animals = [];
        let currentPhotoBase64 = null;
        let currentFilter = 'all'; 

        function initApp() {
            document.getElementById('current-trainer-display').innerText = CURRENT_TRAINER;
            showView('list');
        }

        database.ref('animals').on('value', (snapshot) => {
            const data = snapshot.val();
            animals = [];
            if (data) {
                Object.keys(data).forEach(key => animals.push(data[key]));
                animals.sort((a, b) => b.id - a.id);
            }
            renderFilters();
            if (!document.getElementById('view-list').classList.contains('hidden')) renderTasks();
        });

        function showView(view) {
            document.getElementById('view-reg').classList.toggle('hidden', view !== 'reg');
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            
            document.getElementById('tab-list').className = view === 'list' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            document.getElementById('tab-reg').className = view === 'reg' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            
            const navButtons = document.querySelectorAll('nav button span.text-2xl');
            navButtons[0].classList.toggle('opacity-30', view !== 'list');
            navButtons[1].classList.toggle('opacity-30', view !== 'reg');

            window.scrollTo(0,0);
            if(view === 'list') renderTasks();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            renderFilters();
            renderTasks();
        }

        function renderFilters() {
            const container = document.getElementById('filter-container');
            const filters = [
                { id: 'all', label: '전체 보기' },
                { id: 'cat', label: '고양이 🐱' },
                { id: 'adopt', label: '입양 대기 💝' }
            ];
            container.innerHTML = filters.map(f => `
                <button onclick="setFilter('${f.id}')" class="whitespace-nowrap px-4 py-2 rounded-full text-[11px] font-black transition-all ${currentFilter === f.id ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-pink-300 border border-pink-100'}">${f.label}</button>
            `).join('');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const max_size = 500; 
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    const previewArea = document.getElementById('photo-preview');
                    previewArea.style.backgroundImage = `url(${currentPhotoBase64})`;
                    document.getElementById('photo-placeholder').classList.add('hidden');
                    document.getElementById('del-photo-btn').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function removePhoto(event) {
            if(event) event.stopPropagation();
            currentPhotoBase64 = null;
            document.getElementById('photo-preview').style.backgroundImage = 'none';
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('del-photo-btn').classList.add('hidden');
            document.getElementById('in-photo').value = '';
        }

        function saveAnimal() {
            document.querySelectorAll('input, textarea, select').forEach(el => el.blur());
            const nameEl = document.getElementById('in-name');
            const name = nameEl.value.trim();
            if(!name) { openModal('error', '이름을 적어주세요!', '아이의 이름을 입력해야 등록이 완료됩니다.'); return; }
            
            const newId = Date.now();
            const newAnimal = {
                id: newId, photo: currentPhotoBase64, name: name,
                breed: document.getElementById('in-breed').value || '미상',
                gender: document.getElementById('in-gender').value || '미정',
                age: document.getElementById('in-age').value || '미상',
                status: document.getElementById('in-status').value || '보호 중 🏡',
                personality: document.getElementById('in-personality').value || '정보없음',
                memo: document.getElementById('in-memo').value || '',
                daily_logs: {} 
            };

            database.ref('animals/' + newId).set(newAnimal).then(() => {
                nameEl.value = "";
                ['in-breed','in-age','in-personality','in-memo'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
                document.getElementById('in-gender').value = "";
                document.getElementById('in-status').value = "보호 중 🏡";
                removePhoto(); 
                openModal('success', '등록 성공! ✨', `${name}의 정보가 클라우드에 공유됩니다.`);
                showView('list');
            });
        }

        // [수정된 부분] 업무 리스트 렌더링 - 기록 보기/작성 버튼 분리
        function renderTasks() {
            const container = document.getElementById('task-container');
            const filteredAnimals = animals.filter(a => {
                if (currentFilter === 'cat') return a.breed.includes('고양이') || a.breed.includes('묘') || a.breed.includes('코숏');
                if (currentFilter === 'adopt') return a.status && a.status.includes('입양 대기');
                return true;
            });

            if(filteredAnimals.length === 0) { 
                container.innerHTML = '<div class="text-center py-20 text-gray-400 font-bold">표시할 아이가 없습니다.</div>'; 
                return; 
            }
            
            container.innerHTML = `<h3 class="font-black text-gray-400 px-2 mb-3 text-[10px] uppercase tracking-widest">보호 동물 목록 (${filteredAnimals.length})</h3>`;
            
            filteredAnimals.forEach(a => {
                const photoHtml = a.photo ? `<div class="w-16 h-16 rounded-[18px] bg-cover bg-center shrink-0 shadow-sm border border-pink-50" style="background-image: url(${a.photo})"></div>` : `<div class="w-16 h-16 rounded-[18px] bg-pink-50 flex items-center justify-center shrink-0 text-pink-200 text-2xl">🐾</div>`;
                const badgeColor = a.status && a.status.includes('입양 대기') ? 'bg-pink-500 text-white shadow-md' : (a.status && a.status.includes('훈련 중') ? 'bg-orange-400 text-white shadow-md' : 'bg-blue-50 text-blue-500');
                
                const logCount = a.daily_logs ? Object.keys(a.daily_logs).length : 0;

                container.innerHTML += `
                    <div class="card border-pink-50 mb-4 hover:shadow-lg transition-all">
                        <div class="flex items-center gap-4 cursor-pointer active:scale-[0.98] transition-transform" onclick="openRecordPanel(${a.id})">
                            ${photoHtml}
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="px-2 py-0.5 rounded-md text-[9px] font-black ${badgeColor}">${a.status || '보호 중 🏡'}</span>
                                    <button onclick="askDelete(event, ${a.id})" class="text-xl text-gray-200 hover:text-pink-500 transition-colors z-10">&times;</button>
                                </div>
                                <h3 class="font-black text-lg text-gray-800 truncate">${a.name}</h3>
                                <p class="text-[10px] text-gray-400 font-bold">${a.breed} · ${a.gender}</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-pink-50 flex justify-between items-center">
                            <button onclick="openHistoryPanel(event, ${a.id})" class="text-xs font-bold text-gray-500 hover:text-pink-500 transition-colors flex items-center gap-1 active:scale-95">
                                📝 누적 기록: <span class="text-pink-500 underline font-black">${logCount}건 보기</span>
                            </button>
                            <button onclick="openRecordPanel(${a.id})" class="text-xs font-black text-pink-500 bg-pink-50 px-3 py-1.5 rounded-xl active:scale-95 transition-transform">
                                일일 기록 작성 &rarr;
                            </button>
                        </div>
                    </div>`;
            });
        }

        /* --- [새로 추가된 로직] 기록 열람(History) 패널 기능 --- */
        function openHistoryPanel(event, id) {
            event.stopPropagation(); // 카드 클릭(기록 작성)으로 넘어가는 것 방지
            const ani = animals.find(a => a.id === id);
            if(!ani) return;
            
            const photoHtml = ani.photo ? `<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-pink-100" style="background-image: url(${ani.photo})"></div>` : `<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl">🐾</div>`;
            document.getElementById('hp-header-info').innerHTML = `${photoHtml}<div class="flex flex-col"><span class="font-black text-gray-800 text-lg leading-tight">${ani.name}</span><span class="text-[10px] text-pink-400 font-bold">과거 기록 열람</span></div>`;
            
            renderHistory(ani);
            document.getElementById('history-panel').classList.remove('translate-x-full');
        }

        function closeHistoryPanel() {
            document.getElementById('history-panel').classList.add('translate-x-full');
        }

        function renderHistory(ani) {
            const container = document.getElementById('hp-logs-container');
            
            if(!ani.daily_logs || Object.keys(ani.daily_logs).length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-400 font-bold mt-20"><span class="text-4xl mb-3">📭</span><p>아직 작성된 일일 기록이 없습니다.</p></div>`;
                return;
            }

            // 최신 기록이 위로 오도록 정렬 (내림차순)
            const logsArray = Object.values(ani.daily_logs).sort((a, b) => b.timestamp - a.timestamp);

            container.innerHTML = logsArray.map(log => {
                const condIcon = log.walk.condition === '좋음' ? '🟢' : (log.walk.condition === '나쁨' ? '🔴' : '🟡');
                return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-100">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                        <span class="text-xs text-gray-500 font-bold">${log.date_str}</span>
                        <span class="text-[10px] bg-pink-50 text-pink-500 px-2 py-1 rounded-md font-black">작성: ${log.trainer_name}</span>
                    </div>
                    <div class="space-y-2 text-sm text-gray-700">
                        <div class="flex items-start gap-2"><span class="text-base">🐕</span> <p><strong class="text-gray-900">산책:</strong> ${log.walk.time} / ${log.walk.duration}분 / ${condIcon} ${log.walk.condition}</p></div>
                        <div class="flex items-start gap-2"><span class="text-base">🥣</span> <p><strong class="text-gray-900">급여:</strong> ${log.meal.time} / ${log.meal.amount}g / ${log.meal.status}</p></div>
                        <div class="flex items-start gap-2"><span class="text-base">💩</span> <p><strong class="text-gray-900">배변:</strong> ${log.potty.type} / ${log.potty.status}</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        /* --- 기존 상세 기록 작성 로직 --- */
        function openRecordPanel(id) {
            const ani = animals.find(a => a.id === id);
            if(!ani) return;
            document.getElementById('rp-animal-id').value = id;
            
            const photoHtml = ani.photo ? `<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-pink-100" style="background-image: url(${ani.photo})"></div>` : `<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl">🐾</div>`;
            document.getElementById('rp-header-info').innerHTML = `${photoHtml}<div class="flex flex-col"><span class="font-black text-gray-800 text-lg leading-tight">${ani.name}</span><span class="text-[10px] text-pink-400 font-bold">일일 상태 기록 작성</span></div>`;
            
            resetRecordForm();
            document.getElementById('record-panel').classList.remove('translate-x-full');
        }

        function closeRecordPanel() {
            document.getElementById('record-panel').classList.add('translate-x-full');
            document.activeElement.blur();
        }

        function toggleSelect(clickedBtn, groupClass) {
            document.querySelectorAll(`.${groupClass}-btn`).forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('btn-inactive');
            });
            clickedBtn.classList.remove('btn-inactive');
            clickedBtn.classList.add('btn-active');
        }

        function toggleMulti(clickedBtn) {
            if(clickedBtn.classList.contains('btn-active')) {
                clickedBtn.classList.remove('btn-active');
                clickedBtn.classList.add('btn-inactive');
            } else {
                clickedBtn.classList.remove('btn-inactive');
                clickedBtn.classList.add('btn-active');
            }
        }

        function resetRecordForm() {
            toggleSelect(document.querySelector('.walk-time-btn'), 'walk-time');
            toggleSelect(document.querySelector('.walk-cond-btn'), 'walk-cond');
            toggleSelect(document.querySelector('.meal-time-btn'), 'meal-time');
            toggleSelect(document.querySelector('.meal-status-btn'), 'meal-status');
            
            document.getElementById('potty-type-feces').className = 'potty-type-btn flex-1 py-3 rounded-2xl border btn-active';
            document.getElementById('potty-type-urine').className = 'potty-type-btn flex-1 py-3 rounded-2xl border btn-inactive';
            
            document.getElementById('walk-duration').value = '';
            document.getElementById('meal-amount').value = '';
            document.getElementById('potty-status').value = '정상';
        }

        function saveDetailLog() {
            const id = document.getElementById('rp-animal-id').value;
            if(!id) return;

            const walkTime = document.querySelector('.walk-time-btn.btn-active').innerText;
            const walkDuration = document.getElementById('walk-duration').value || "0";
            const walkCond = document.querySelector('.walk-cond-btn.btn-active').innerText.split(' ')[1]; 

            const mealTime = document.querySelector('.meal-time-btn.btn-active').innerText;
            const mealAmount = document.getElementById('meal-amount').value || "0";
            const mealStatus = document.querySelector('.meal-status-btn.btn-active').innerText;

            const pottyTypes = [];
            if(document.getElementById('potty-type-feces').classList.contains('btn-active')) pottyTypes.push("대변");
            if(document.getElementById('potty-type-urine').classList.contains('btn-active')) pottyTypes.push("소변");
            const pottyStatus = document.getElementById('potty-status').value;

            // 기록 시간에 년월일 및 시간(분)까지 보기 좋게 포맷팅
            const now = new Date();
            const formattedDate = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const logData = {
                timestamp: Date.now(),
                trainer_name: CURRENT_TRAINER,
                walk: { time: walkTime, duration: walkDuration, condition: walkCond },
                meal: { time: mealTime, amount: mealAmount, status: mealStatus },
                potty: { type: pottyTypes.join(', ') || '없음', status: pottyStatus },
                date_str: formattedDate
            };

            database.ref('animals/' + id + '/daily_logs/' + Date.now()).set(logData).then(() => {
                closeRecordPanel();
                openModal('success', '기록 완료!', `${CURRENT_TRAINER}님의 이름으로 데이터가 안전하게 저장되었습니다.`);
            });
        }

        function openModal(type, title, desc, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const btns = document.getElementById('modal-btns');
            document.getElementById('modal-icon').innerText = type === 'success' ? '✨' : (type === 'error' ? '💡' : '🗑️');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.add('active');
            if (type === 'confirm') {
                btns.innerHTML = `<button onclick="closeModal()" class="flex-1 py-4 bg-gray-50 text-gray-400 font-black rounded-2xl">취소</button><button id="modal-confirm-btn" class="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl shadow-md">삭제</button>`;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            } else {
                btns.innerHTML = `<button onclick="closeModal()" class="w-full py-4 pink-gradient text-white font-black rounded-2xl shadow-md">확인</button>`;
            }
        }
        function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }
        
        function askDelete(event, id) { 
            event.stopPropagation();
            openModal('confirm', '정말 삭제할까요?', '모든 일지와 기록이 서버에서 영구 삭제됩니다.', () => { 
                database.ref('animals/' + id).remove(); 
            }); 
        }
    </script>
</body>
</html>
