<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내품애센터 관리 앱</title>
    <style>
        body { background-color: #fff5f7; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #ffe4e9; }
        h1 { color: #ff69b4; text-align: center; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ffe4e9; border-radius: 10px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #ff69b4; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .dog-item { background: #fff5f7; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #ff69b4; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐶 내품애센터 관리</h1>
        
        <div style="margin-bottom: 20px;">
            <input type="text" id="dogName" placeholder="강아지 이름 입력">
            <button onclick="addDog()">등록하기</button>
        </div>

        <div id="dogList">
            </div>
    </div>

    <script>
        // 데이터 불러오기
        let dogs = JSON.parse(localStorage.getItem('my_dogs') || '[]');

        function render() {
            const list = document.getElementById('dogList');
            list.innerHTML = '<h3>등록 목록 (' + dogs.length + ')</h3>';
            dogs.forEach((dog, index) => {
                list.innerHTML += `<div class="dog-item">${dog}</div>`;
            });
        }

        function addDog() {
            const input = document.getElementById('dogName');
            if (!input.value) return;
            dogs.push(input.value);
            localStorage.setItem('my_dogs', JSON.stringify(dogs));
            input.value = '';
            render();
        }

        // 처음 시작할 때 화면 그리기
        render();
    </script>
</body>
</html>
